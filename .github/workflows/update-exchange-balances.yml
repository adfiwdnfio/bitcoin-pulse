name: Update Exchange Balances

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch exchange balances
        env:
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
        run: node scripts/update-exchange-balances.mjs

      - name: Commit updated balance feed
        run: |
          if git diff --quiet public/data/exchange-balances.json; then
            echo "No balance feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/exchange-balances.json
          git commit -m "Update exchange balance feed"
          git push
