(() => {
/* ============================================
   Strategy / MicroStrategy Bitcoin Holdings
   Live StrategyTracker data and treasury charts
   ============================================ */

const React = window.React;
const { createElement: h, useEffect, useMemo, useState } = React;

function safeNumber(value, fallback = null) {
  const num = Number(value);
  return Number.isFinite(num) ? num : fallback;
}

function lastValue(values) {
  return Array.isArray(values) && values.length ? values[values.length - 1] : null;
}

function parseDateOnly(dateStr) {
  if (typeof dateStr === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const parts = dateStr.split('-').map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }
  return new Date(dateStr);
}

function daysBetween(startDate, endDate) {
  const start = startDate instanceof Date ? startDate : parseDateOnly(startDate);
  const end = endDate instanceof Date ? endDate : parseDateOnly(endDate);
  if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return null;
  return Math.max(1, Math.ceil((end - start) / 86400000));
}

function formatMultiple(value) {
  return value === null || value === undefined ? '...' : value.toFixed(2) + 'x';
}

function formatSignedPercent(value, decimals = 2) {
  if (value === null || value === undefined || !Number.isFinite(Number(value))) return '...';
  const num = Number(value);
  return (num >= 0 ? '+' : '') + num.toFixed(decimals) + '%';
}

function formatLocalDate(dateStr) {
  const d = parseDateOnly(dateStr);
  if (Number.isNaN(d.getTime())) return dateStr || '...';
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function compactDateLabel(dateStr) {
  const d = parseDateOnly(dateStr);
  if (Number.isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}

function shortDateLabel(dateStr) {
  const d = parseDateOnly(dateStr);
  if (Number.isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function filterByRange(dates, range) {
  if (!dates || !dates.length || range === 'max') return 0;
  const last = parseDateOnly(dates[dates.length - 1]);
  if (Number.isNaN(last.getTime())) return 0;
  const cutoff = new Date(last);
  if (range === '1d') cutoff.setDate(cutoff.getDate() - 1);
  if (range === '1w') cutoff.setDate(cutoff.getDate() - 7);
  if (range === '1m') cutoff.setMonth(cutoff.getMonth() - 1);
  if (range === '3m') cutoff.setMonth(cutoff.getMonth() - 3);
  if (range === '6m') cutoff.setMonth(cutoff.getMonth() - 6);
  if (range === '1y') cutoff.setFullYear(cutoff.getFullYear() - 1);
  if (range === '3y') cutoff.setFullYear(cutoff.getFullYear() - 3);
  if (range === '5y') cutoff.setFullYear(cutoff.getFullYear() - 5);
  if (range === 'ytd') cutoff.setMonth(0, 1);
  cutoff.setHours(0, 0, 0, 0);
  const found = dates.findIndex(date => parseDateOnly(date) >= cutoff);
  return found >= 0 ? found : 0;
}

function downsample(labels, series, maxPoints = 220) {
  if (!labels || !labels.length) return { labels: [], series: series.map(() => []) };
  const step = Math.max(1, Math.ceil(labels.length / maxPoints));
  const nextLabels = [];
  const nextSeries = series.map(() => []);
  for (let i = 0; i < labels.length; i += step) {
    nextLabels.push(labels[i]);
    series.forEach((values, idx) => nextSeries[idx].push(values[i]));
  }
  const lastIdx = labels.length - 1;
  if (nextLabels[nextLabels.length - 1] !== labels[lastIdx]) {
    nextLabels.push(labels[lastIdx]);
    series.forEach((values, idx) => nextSeries[idx].push(values[lastIdx]));
  }
  return { labels: nextLabels, series: nextSeries };
}

function buildHistoricalChartData(historicalData, range, snapshot) {
  const dates = historicalData.dates || [];
  if (!dates.length) return null;
  const start = filterByRange(dates, range);
  const rawLabels = dates.slice(start);
  const btcBalance = (historicalData.btc_balance || []).slice(start);
  const holdingsValue = (historicalData.holdings_value || []).slice(start);
  const marketCap = (historicalData.market_cap_basic || []).slice(start);
  const navDiluted = (historicalData.nav_premium_diluted || []).slice(start);
  const stockPrices = (historicalData.stock_prices || []).slice(start);
  const btcPrices = (historicalData.btc_prices || []).slice(start);

  if (snapshot && rawLabels.length) {
    btcBalance[btcBalance.length - 1] = snapshot.holdings || btcBalance[btcBalance.length - 1];
    holdingsValue[holdingsValue.length - 1] = snapshot.holdingsValue || holdingsValue[holdingsValue.length - 1];
    marketCap[marketCap.length - 1] = snapshot.marketCap || marketCap[marketCap.length - 1];
    navDiluted[navDiluted.length - 1] = snapshot.dilutedNavMultiple || navDiluted[navDiluted.length - 1];
    stockPrices[stockPrices.length - 1] = snapshot.stockPrice || stockPrices[stockPrices.length - 1];
    btcPrices[btcPrices.length - 1] = snapshot.btcPrice || btcPrices[btcPrices.length - 1];
  }

  const firstStock = stockPrices.find(v => Number.isFinite(Number(v)) && Number(v) > 0) || 1;
  const firstBtc = btcPrices.find(v => Number.isFinite(Number(v)) && Number(v) > 0) || 1;
  const mstrPerformance = stockPrices.map(v => v ? (v / firstStock) * 100 : null);
  const btcPerformance = btcPrices.map(v => v ? (v / firstBtc) * 100 : null);
  const sampled = downsample(rawLabels, [btcBalance, holdingsValue, marketCap, navDiluted, mstrPerformance, btcPerformance], 240);

  return {
    labels: sampled.labels.map(compactDateLabel),
    btcBalance: sampled.series[0],
    holdingsValue: sampled.series[1],
    marketCap: sampled.series[2],
    navDiluted: sampled.series[3],
    mstrPerformance: sampled.series[4],
    btcPerformance: sampled.series[5],
  };
}

function buildAcquisitionBars(treasuryTable, range = 'max') {
  const rows = (treasuryTable || []).filter(row => Number.isFinite(row.change) && row.change !== 0);
  const start = filterByRange(rows.map(row => row.date), range);
  const ranged = rows.slice(start);
  const visible = ranged.slice(-40);
  return {
    labels: visible.map(row => shortDateLabel(row.date)),
    values: visible.map(row => row.change),
    colors: visible.map(row => row.change >= 0 ? 'rgba(247, 147, 26, 0.82)' : 'rgba(255, 71, 87, 0.72)'),
  };
}

function buildPaceStats(metrics, treasuryTable) {
  const latestDate = metrics.latestTreasuryDate || (treasuryTable.length ? treasuryTable[treasuryTable.length - 1].date : null);
  const firstDate = metrics.preAdoptionInfo ? metrics.preAdoptionInfo.firstPurchaseDate : (treasuryTable[0] && treasuryTable[0].date);
  const latestHoldings = safeNumber(metrics.latestBtcBalance, lastValue(treasuryTable.map(row => row.balance)) || 0);
  const ytdGain = lastValue(metrics.btcYieldDataYearly && metrics.btcYieldDataYearly.btcGained) || 0;
  const ytdDays = latestDate ? daysBetween(new Date(parseDateOnly(latestDate).getFullYear(), 0, 1), latestDate) : null;
  const lifetimeDays = firstDate && latestDate ? daysBetween(firstDate, latestDate) : null;
  const last90Cutoff = latestDate ? new Date(parseDateOnly(latestDate).getTime() - 90 * 86400000) : null;
  const last90Gain = last90Cutoff
    ? treasuryTable.filter(row => parseDateOnly(row.date) >= last90Cutoff && row.change > 0).reduce((sum, row) => sum + row.change, 0)
    : 0;

  return {
    ytdPerDay: ytdDays ? ytdGain / ytdDays : null,
    last90PerDay: last90Gain ? last90Gain / 90 : null,
    lifetimePerDay: lifetimeDays ? latestHoldings / lifetimeDays : null,
  };
}

function buildLiquidityChartData(liquidity, range) {
  if (!liquidity || !Array.isArray(liquidity.dates)) return null;
  const start = filterByRange(liquidity.dates, range);
  const labels = liquidity.dates.slice(start).map(compactDateLabel);
  const daily = (liquidity.daily_traded_values || []).slice(start);
  const weekly = (liquidity.weekly_avg_traded_values || []).slice(start);
  return downsample(labels, [daily, weekly], 160);
}

function getQuarterCountForRange(range) {
  const counts = {
    '1d': 4,
    '1w': 4,
    '1m': 4,
    '3m': 4,
    '6m': 4,
    '1y': 4,
    '3y': 12,
    '5y': 20,
    max: 80,
  };
  return counts[range] || 12;
}

  { id: 'max', label: 'MAX', days: 'max', description: 'Full available history' },
];

function cleanPricePoints(points) {
  return (Array.isArray(points) ? points : [])
    .map(point => [Number(point[0]), Number(point[1])])
    .filter(point => Number.isFinite(point[0]) && Number.isFinite(point[1]) && point[1] > 0)
    .sort((a, b) => a[0] - b[0]);
}

function appendLivePricePoint(points, price) {
  const rows = cleanPricePoints(points);
  const livePrice = Number(price);
  if (!Number.isFinite(livePrice) || livePrice <= 0) return rows;
  const now = Date.now();
  const last = rows[rows.length - 1];
  if (!last || now - last[0] > 60000) return [...rows, [now, livePrice]];
  return [...rows.slice(0, -1), [last[0], livePrice]];
}

function calcStats(points) {
  if (!points.length) {
    return { latest: null, first: null, high: null, low: null, change: null, changePercent: null };
  }
  const first = points[0][1];
  const latest = points[points.length - 1][1];
  const values = points.map(point => point[1]);
  const change = latest - first;
  return {
    latest,
    first,
    high: Math.max(...values),
    low: Math.min(...values),
    change,
    changePercent: first ? (change / first) * 100 : null,
  };
}

function formatSelectedDate(timestamp, range) {
  const date = new Date(timestamp);
  if (range === '1d') {
    return date.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

}

function InteractivePriceChart({ points, selectedIndex, onSelect, range }) {
  const svgRef = useRef(null);
  if (!points.length) {
    return h('div', { className: 'price-chart-empty' }, 'Loading live BTC chart...');
  }

  const width = 760;
  const height = 320;
  const pad = { top: 26, right: 24, bottom: 38, left: 54 };
  const values = points.map(point => point[1]);
  let min = Math.min(...values);
  let max = Math.max(...values);
  const spread = max - min || max * 0.02 || 1;
  min -= spread * 0.08;
  max += spread * 0.08;

  const xFor = index => pad.left + (index / Math.max(1, points.length - 1)) * (width - pad.left - pad.right);
  const yFor = value => pad.top + (1 - ((value - min) / (max - min))) * (height - pad.top - pad.bottom);
  const path = points.map((point, index) => (index ? 'L' : 'M') + xFor(index).toFixed(2) + ' ' + yFor(point[1]).toFixed(2)).join(' ');
  const area = path + ' L ' + xFor(points.length - 1).toFixed(2) + ' ' + (height - pad.bottom) + ' L ' + pad.left + ' ' + (height - pad.bottom) + ' Z';
  const safeSelected = selectedIndex === null || selectedIndex === undefined
    ? points.length - 1
    : Math.max(0, Math.min(points.length - 1, selectedIndex));
  const selected = points[safeSelected];
  const selectedX = xFor(safeSelected);
  const selectedY = yFor(selected[1]);
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(step => max - (max - min) * step);

  const selectFromClientX = (clientX) => {
    if (!svgRef.current || !Number.isFinite(clientX)) return;
    const rect = svgRef.current.getBoundingClientRect();
    const innerLeft = (pad.left / width) * rect.width;
    const innerWidth = ((width - pad.left - pad.right) / width) * rect.width;
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left - innerLeft) / Math.max(1, innerWidth)));
    onSelect(Math.round(ratio * (points.length - 1)));
  };

  const handlePointer = (event) => {
    if (event.type === 'pointermove' && event.buttons === 0) return;
    selectFromClientX(event.clientX);
  };

  const handleTouch = (event) => {
    const touch = event.touches && event.touches[0];
    if (touch) selectFromClientX(touch.clientX);
  };

  return h('div', { className: 'price-chart-stage' },
    h('svg', {
      ref: svgRef,
      className: 'price-chart-svg',
      viewBox: '0 0 ' + width + ' ' + height,
      role: 'img',
      'aria-label': 'Interactive BTC price chart',
      onPointerDown: handlePointer,
      onPointerMove: handlePointer,
      onTouchStart: handleTouch,
      onTouchMove: handleTouch,

      h('defs', null,
        h('linearGradient', { id: 'priceAreaGradient', x1: '0', y1: '0', x2: '0', y2: '1' },

        ),
        h('filter', { id: 'priceGlow', x: '-20%', y: '-20%', width: '140%', height: '140%' },
          h('feGaussianBlur', { stdDeviation: '3', result: 'blur' }),
          h('feMerge', null, h('feMergeNode', { in: 'blur' }), h('feMergeNode', { in: 'SourceGraphic' }))
        )
      ),
      h('rect', { x: 0, y: 0, width, height, rx: 24, fill: 'rgba(0,0,0,0.18)' }),
      yTicks.map((tick, index) => h('g', { key: index },
        h('line', {
          x1: pad.left,
          x2: width - pad.right,
          y1: yFor(tick),
          y2: yFor(tick),

    )
  );
}

function getEtfRangeDays(range) {
  const found = ETF_RANGES.find(item => item.id === range);
  return found ? found.days : 30;
}

function formatFlow(value, decimals = 1) {
  const n = Number(value);
  if (!Number.isFinite(n)) return '—';
  const sign = n > 0 ? '+' : n < 0 ? '-' : '';
  const abs = Math.abs(n);
  if (abs >= 1000) return sign + '$' + (abs / 1000).toFixed(2) + 'B';
  return sign + '$' + abs.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }) + 'M';
}

function flowTone(value) {
  const n = Number(value);
  if (n > 0) return 'positive';
  if (n < 0) return 'negative';
  return '';
}

function filterRowsForRange(rows, range) {
  if (!Array.isArray(rows) || !rows.length) return [];
  const days = getEtfRangeDays(range);
  if (days === 'max') return rows;
  if (range === '1d') return rows.slice(-1);
  const cutoff = rows[rows.length - 1].timestamp - Number(days) * 86400000;
  const filtered = rows.filter(row => row.timestamp >= cutoff);
  return filtered.length ? filtered : rows.slice(-Math.max(1, Math.min(rows.length, Number(days))));

const React = window.React;
const { createElement: h, useMemo, useState } = React;

const DOMINANCE_RANGES = [
  { id: '1d', label: 'D', days: 1, description: 'Live day' },
  { id: '1w', label: '1W', days: 7, description: 'Past week' },
  { id: '1m', label: '1M', days: 30, description: 'Past month' },
  { id: '3m', label: '3M', days: 90, description: 'Past 3 months' },
  { id: '6m', label: '6M', days: 180, description: 'Past 6 months' },
  { id: '1y', label: '1Y', days: 365, description: 'Past year' },
  { id: '3y', label: '3Y', days: 1095, description: 'Past 3 years' },
  { id: '5y', label: '5Y', days: 1825, description: 'Past 5 years' },
  { id: 'max', label: 'MAX', days: 'max', description: 'All saved live readings' },
];

function getDominanceRangeDays(range) {
  const found = DOMINANCE_RANGES.find(item => item.id === range);
  return found ? found.days : 30;
}

function filterDominanceHistory(rows, range) {
  const clean = (Array.isArray(rows) ? rows : [])
    .map(row => [Number(row.ts), Number(row.dominance)])
    .filter(row => Number.isFinite(row[0]) && Number.isFinite(row[1]))
    .sort((a, b) => a[0] - b[0]);
  const days = getDominanceRangeDays(range);
  if (days === 'max' || !clean.length) return clean;
  const cutoff = Date.now() - Number(days) * 86400000;
  const filtered = clean.filter(row => row[0] >= cutoff);
  return filtered.length ? filtered : clean;
}

function dominanceTone(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return 'neutral';
  if (n >= 60) return 'strong';
  if (n >= 50) return 'balanced';
  return 'alt-season';
}

function sourceQualityLabel(spread, sourceCount) {
  if (!sourceCount) return 'Waiting for sources';
  if (sourceCount < 2) return 'Single-source live';

  return 'Wide source spread';
}

/* ============================================
   Bitcoin Large Transaction Tracker
   Live mempool data from mempool.space
   ============================================ */

const React = window.React;
const { createElement: h, useEffect, useState } = React;

async function fetchTransactionDetail(txid) {
  return fetchWithFallback('https://mempool.space/api/tx/' + txid, null, 8000);
}

function getLargestOutput(tx, fallbackValue) {
  const outputs = Array.isArray(tx && tx.vout) ? tx.vout : [];
  return outputs.reduce(
    (largest, output) => ((output.value || 0) > (largest.value || 0) ? output : largest),
    { value: fallbackValue || 0 },
  );
}

async function fetchRecentLargeTransactions(btcPrice) {
  const recent = await fetchWithFallback('https://mempool.space/api/mempool/recent', [], 10000);
  const transactions = Array.isArray(recent) ? recent.slice(0, 10) : [];

  const enriched = await Promise.all(transactions.map(async (tx) => {
    const detail = await fetchTransactionDetail(tx.txid);
    const largestOutput = getLargestOutput(detail, tx.value);
    const firstInput = detail && Array.isArray(detail.vin)
      ? detail.vin.find((input) => input.prevout && input.prevout.scriptpubkey_address)
      : null;
    const sats = Math.max(Number(tx.value) || 0, Number(largestOutput.value) || 0);
    const amount = sats / 1e8;

    return {
      id: tx.txid,
      amount,
      fee: (Number(tx.fee) || 0) / 1e8,
      feeRate: tx.vsize ? (Number(tx.fee) || 0) / tx.vsize : null,
      from: firstInput && firstInput.prevout ? firstInput.prevout.scriptpubkey_address : 'unknown',
      to: largestOutput.scriptpubkey_address || 'unknown',
      timestamp: new Date(),
      usdValue: amount * btcPrice,
    };
  }));

  return enriched
    .filter((tx) => tx.amount > 0)
    .sort((a, b) => b.amount - a.amount);
}

  );

function formatTimeAgo(date, nowMs = Date.now()) {
  const seconds = Math.floor((nowMs - date.getTime()) / 1000);
  if (seconds < 60) return seconds + 's ago';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
  return Math.floor(seconds / 3600) + 'h ago';
}

/* ------------------------------------------
   Live data fetching functions (ad-blocker resilient)
   Uses tryFetch pattern: returns null on failure, never throws
   ------------------------------------------ */

async function tryFetch(url, timeoutMs = 8000) {
  try {
    const c = new AbortController();
    const t = setTimeout(() => c.abort(), timeoutMs);
    const res = await fetch(url, { signal: c.signal });
    clearTimeout(t);
    if (!res.ok) return null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('json')) return await res.json();
    return await res.text();
  } catch {
    return null;
  }
}

/* ------------------------------------------
   Per-exchange live data fetchers
   Each returns { reserve, volume24hBtc, source }
   "reserve" uses CoinGecko exchange data where
   available; volume comes from exchange APIs.
   ------------------------------------------ */

async function fetchBinanceData() {
  const data = await tryFetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT', 8000);
  if (data && data.volume) {
    return {
      volume24hBtc: parseFloat(data.volume) || 0,
      quoteVolume: parseFloat(data.quoteVolume) || 0,
      price: parseFloat(data.lastPrice) || 0,
      source: 'binance-api',
    };
  }
  return null;
}

/* ------------------------------------------
   Format exact BTC number (no rounding to K/M)
   ------------------------------------------ */
function formatExactBTC(value) {
  if (value === null || value === undefined || value === 0) return '—';
  // Show full number with 2 decimal places and commas
  return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatExactInt(value) {
  if (value === null || value === undefined || value === 0) return '—';
  return value.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function formatExactBTCFull(value) {
  if (value === null || value === undefined || value === 0) return '—';
  // Show up to 8 decimal places (satoshi precision) for circulating supply
  return value.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 8 });
}

function formatRelativeAge(timestamp) {
  if (!timestamp) return 'using reference backup';
  const ageMs = Date.now() - new Date(timestamp).getTime();
  if (!Number.isFinite(ageMs) || ageMs < 0) return 'just checked';
  const seconds = Math.floor(ageMs / 1000);
  if (seconds < 60) return 'checked ' + seconds + 's ago';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return 'checked ' + minutes + 'm ago';
  const hours = Math.floor(minutes / 60);
  if (hours < 48) return 'checked ' + hours + 'h ago';
  return 'checked ' + Math.floor(hours / 24) + 'd ago';
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function daysSinceGenesisAt(timestamp) {
  return Math.max(1, Math.floor((timestamp - BTC_GENESIS.getTime()) / DAY_MS));
}

function calcSMA(values, period) {
  const result = [];
  let rolling = 0;
  for (let i = 0; i < values.length; i += 1) {
    const value = Number.isFinite(values[i]) ? values[i] : 0;
    rolling += value;
    if (i >= period) rolling -= Number.isFinite(values[i - period]) ? values[i - period] : 0;
    result.push(i >= period - 1 ? rolling / period : null);
  }
  return result;
}

function calcDrawdown(values) {
  let peak = -Infinity;
  return values.map(value => {
    if (!Number.isFinite(value)) return null;
    peak = Math.max(peak, value);
    return peak > 0 ? ((value - peak) / peak) * 100 : 0;
  });
}

function stddev(values) {
  const valid = values.filter(Number.isFinite);
  if (!valid.length) return null;
  const mean = valid.reduce((sum, value) => sum + value, 0) / valid.length;
  const variance = valid.reduce((sum, value) => sum + (value - mean) ** 2, 0) / valid.length;
  return Math.sqrt(variance);
}

function latestFinite(values) {
  for (let i = values.length - 1; i >= 0; i -= 1) {
    if (Number.isFinite(values[i])) return values[i];
  }
  return null;
}

function firstFinite(values) {
  for (let i = 0; i < values.length; i += 1) {
    if (Number.isFinite(values[i])) return values[i];
  }
  return null;
}

function seriesStats(values) {
  const valid = (values || []).filter(Number.isFinite);
  const first = firstFinite(values || []);
  const latest = latestFinite(values || []);
  const change = Number.isFinite(first) && Number.isFinite(latest) ? latest - first : null;
  const changePercent = Number.isFinite(change) && first !== 0 ? (change / Math.abs(first)) * 100 : null;
  const average = valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : null;
  return {
    first,
    latest,
    average,
    change,
    changePercent,
    min: valid.length ? Math.min(...valid) : null,
    max: valid.length ? Math.max(...valid) : null,
  };
}

function spanDays(points) {
  if (!Array.isArray(points) || points.length < 2) return 0;
  const first = points[0]?.[0];
  const last = points[points.length - 1]?.[0];
  if (!Number.isFinite(first) || !Number.isFinite(last) || last <= first) return 0;
  return (last - first) / DAY_MS;
}

function hasEnoughRange(points, range) {
  const days = getRangeDays(range);
  if (days === 'max') return Array.isArray(points) && points.length > 365;
  const numericDays = Number(days);
  if (!Number.isFinite(numericDays)) return false;
  return spanDays(points) >= numericDays * 0.88;
}

function pickBestPriceSource({ range, rangePoints, longPoints, coinMetricPoints }) {
  const candidates = [
    { points: rangePoints, label: 'range feed' },
    { points: longPoints, label: 'market history' },
    { points: coinMetricPoints, label: 'CoinMetrics PriceUSD' },
  ].filter(candidate => Array.isArray(candidate.points) && candidate.points.length > 1);

  const enough = candidates.find(candidate => hasEnoughRange(candidate.points, range));
  if (enough) return enough;

  const longest = candidates.sort((a, b) => spanDays(b.points) - spanDays(a.points))[0];
  return longest || { points: [], label: 'unavailable' };
}

function formatRangeAverage(value, mode) {
  if (!Number.isFinite(value)) return '...';
  if (mode === 'ratio') return value.toFixed(3) + 'x';

  if (mode === 'percent') return formatPercent(value, Math.abs(value) < 10 ? 1 : 0);
  if (mode === 'currency') return formatUSD(value, 0);
  return value.toFixed(Math.abs(value) < 10 ? 2 : 1);
}

function rangeSignalDescription(range, metricName) {

function rangeName(range) {

function signedNumber(value, decimals = 2, suffix = '') {
  if (!Number.isFinite(value)) return '...';
  const sign = value > 0 ? '+' : '';
  return sign + value.toFixed(decimals) + suffix;
}

function appendLivePrice(points, livePrice) {
  if (!Array.isArray(points) || !points.length) return livePrice ? [[Date.now(), livePrice]] : [];
  if (!livePrice) return points;

  const next = points.slice();
  const now = Date.now();
  const last = next[next.length - 1];
  const lastDate = last ? new Date(last[0]) : null;
  const nowDate = new Date(now);
  const sameUtcDay = lastDate
    && lastDate.getUTCFullYear() === nowDate.getUTCFullYear()
    && lastDate.getUTCMonth() === nowDate.getUTCMonth()
    && lastDate.getUTCDate() === nowDate.getUTCDate();

  if (sameUtcDay) next[next.length - 1] = [last[0], livePrice];
  else next.push([now, livePrice]);
  return next;
}

function formatAxisDollar(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return '';
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function formatAxisNumber(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return '';
  if (Math.abs(n) >= 1000) return formatNumber(n, 0);
  return n.toFixed(Math.abs(n) < 10 ? 1 : 0);
}

function formatPointValue(value, mode) {
  if (!Number.isFinite(value)) return 'N/A';
  if (mode === 'currency') return formatUSD(value, value >= 1000 ? 0 : 2);
  if (mode === 'percent') return value.toFixed(2) + '%';
  if (mode === 'ratio') return value.toFixed(3) + 'x';
  if (mode === 'score') return value.toFixed(0);
  return value.toFixed(Math.abs(value) < 10 ? 3 : 2);
}

function getRangeWindow(points, range, maxPoints = 260) {
  const visible = trimSeriesToDays(points, getRangeDays(range));
  const sampled = downsampleSeries(visible, maxPoints);

function rainbowBandValue(timestamp, coeff, offset) {
  const dayIndex = Math.max(1, Math.floor((timestamp - RAINBOW_BASE_DATE.getTime()) / DAY_MS));
  return Math.pow(10, coeff * Math.log(dayIndex + offset) + RAINBOW_INTERCEPT);
}

function powerLawValue(daysSinceGenesis) {
  return Math.exp(POWER_LAW_SLOPE * Math.log(daysSinceGenesis) + POWER_LAW_INTERCEPT);
}

function powerLawPosition(price, timestamp) {
  if (!Number.isFinite(price) || price <= 0) return null;
  const fair = powerLawValue(daysSinceGenesisAt(timestamp));
  const support = fair / 3;
  const resistance = fair * 10;
  return clamp(((Math.log10(price) - Math.log10(support)) / (Math.log10(resistance) - Math.log10(support))) * 100, 0, 100);
}

function getRainbowBand(price, timestamp) {
  for (let i = 0; i < RAINBOW_BANDS.length - 1; i += 1) {
    const upper = rainbowBandValue(timestamp, RAINBOW_BANDS[i].coeff, RAINBOW_BANDS[i].offset);
    const lower = rainbowBandValue(timestamp, RAINBOW_BANDS[i + 1].coeff, RAINBOW_BANDS[i + 1].offset);
    if (price >= lower && price <= upper) return RAINBOW_BANDS[i + 1];
  }
  const lowest = rainbowBandValue(timestamp, RAINBOW_BANDS[RAINBOW_BANDS.length - 1].coeff, RAINBOW_BANDS[RAINBOW_BANDS.length - 1].offset);
  return price < lowest ? RAINBOW_BANDS[RAINBOW_BANDS.length - 1] : RAINBOW_BANDS[0];
}

function normalizeCoinMetrics(data) {
  if (!data || !Array.isArray(data.data)) return [];
  return data.data.map(row => {
    const ts = new Date(row.time).getTime();
    const priceUSD = parseFloat(row.PriceUSD);
    const mvrv = parseFloat(row.CapMVRVCur);
    const marketCap = parseFloat(row.CapMrktCurUSD);
    const realizedCap = Number.isFinite(mvrv) && mvrv > 0 && Number.isFinite(marketCap) ? marketCap / mvrv : null;
    return { ts, priceUSD, mvrv, marketCap, realizedCap };
  }).filter(row => Number.isFinite(row.ts) && Number.isFinite(row.mvrv) && Number.isFinite(row.marketCap) && Number.isFinite(row.realizedCap));
}

async function fetchCoinMetricsValuation() {
  const cacheFresh = coinMetricsCache && Date.now() - coinMetricsCacheAt < 5 * 60 * 1000;
  if (cacheFresh) return coinMetricsCache;

  const data = await tryFetch(COINMETRICS_URL, 16000);
  const rows = normalizeCoinMetrics(data);
  if (rows.length) {
    coinMetricsCache = {
      rows,

        .filter(row => Number.isFinite(row.priceUSD) && row.priceUSD > 0)
        .map(row => [row.ts, row.priceUSD]),
      source: 'CoinMetrics Community API',
      latestDate: new Date(rows[rows.length - 1].ts).toISOString().slice(0, 10),
    };
    coinMetricsCacheAt = Date.now();
    return coinMetricsCache;
  }

  return coinMetricsCache || { rows: [], source: 'CoinMetrics unavailable', latestDate: null };
}

function buildDailyPriceMap(pricePoints) {
  const map = new Map();
  for (const point of pricePoints || []) {
    if (!Array.isArray(point) || !Number.isFinite(point[0]) || !Number.isFinite(point[1])) continue;
    map.set(new Date(point[0]).toISOString().slice(0, 10), point[1]);
  }
  return map;
}

function buildPriceMetricRows(rows, pricePoints, referencePricePoints, livePrice) {
  const sortedRows = Array.isArray(rows)
    ? rows.filter(row => row && Number.isFinite(row.ts) && Number.isFinite(row.marketCap) && Number.isFinite(row.realizedCap)).sort((a, b) => a.ts - b.ts)
    : [];
  const sourcePoints = Array.isArray(pricePoints)
    ? pricePoints.filter(point => Array.isArray(point) && Number.isFinite(point[0]) && Number.isFinite(point[1]) && point[1] > 0).sort((a, b) => a[0] - b[0])
    : [];

  if (!sortedRows.length || !sourcePoints.length) return [];

  const reference = appendLivePrice(
    Array.isArray(referencePricePoints) && referencePricePoints.length ? referencePricePoints : sourcePoints,
    livePrice
  );
  const dailyPriceMap = buildDailyPriceMap(reference);
  const capStddev = stddev(sortedRows.map(row => row.marketCap));
  let rowIndex = 0;

  return sourcePoints.map(point => {
    while (rowIndex < sortedRows.length - 1 && sortedRows[rowIndex + 1].ts <= point[0]) {
      rowIndex += 1;
    }

    const row = sortedRows[rowIndex];
    const rowDate = new Date(row.ts).toISOString().slice(0, 10);
    const rowPrice = row.live && Number.isFinite(livePrice) && livePrice > 0
      ? livePrice
      : dailyPriceMap.get(rowDate);
    const supply = Number.isFinite(rowPrice) && rowPrice > 0
      ? row.marketCap / rowPrice
      : row.marketCap / point[1];
    const marketCap = Number.isFinite(supply) && supply > 0 ? point[1] * supply : row.marketCap;
    const mvrv = row.realizedCap > 0 ? marketCap / row.realizedCap : null;
    const mvrvZ = capStddev ? (marketCap - row.realizedCap) / capStddev : null;

    return {
      ts: point[0],
      price: point[1],
      marketCap,
      realizedCap: row.realizedCap,
      mvrv,
      mvrvZ,
    };
  });
}

function buildMetricWindowFromPricePoints(rows, pricePoints, referencePricePoints, livePrice, range, key) {
  const metrics = buildPriceMetricRows(rows, pricePoints, referencePricePoints, livePrice);
  const points = metrics
    .map(row => [row.ts, row[key]])
    .filter(point => Number.isFinite(point[1]));
  return {
    points,
    labels: points.map(point => formatChartDateLabel(point[0], range)),
    values: points.map(point => point[1]),
  };
}

function applyLiveMvrv(rows, pricePoints, livePrice) {
  if (!Array.isArray(rows) || !rows.length) return [];
  if (!Number.isFinite(livePrice) || livePrice <= 0) return rows;

  const last = rows[rows.length - 1];
  const latestPricePoint = Array.isArray(pricePoints) && pricePoints.length ? pricePoints[pricePoints.length - 1] : null;
  const latestHistoryPrice = latestPricePoint && Number.isFinite(latestPricePoint[1]) ? latestPricePoint[1] : null;
  if (!latestHistoryPrice || latestHistoryPrice <= 0) return rows;

  const liveMarketCap = last.marketCap * (livePrice / latestHistoryPrice);
  const liveRow = {
    ts: Date.now(),
    mvrv: liveMarketCap / last.realizedCap,
    marketCap: liveMarketCap,
    realizedCap: last.realizedCap,
    live: true,
  };
  const next = rows.slice();
  const lastDate = new Date(last.ts).toISOString().slice(0, 10);
  const today = new Date(liveRow.ts).toISOString().slice(0, 10);
  if (lastDate === today) next[next.length - 1] = liveRow;
  else next.push(liveRow);
  return next;
}

function addMvrvZ(rows) {
  const marketCaps = rows.map(row => row.marketCap);
  const capStddev = stddev(marketCaps);
  return rows.map(row => ({
    ...row,
    mvrvZ: capStddev ? (row.marketCap - row.realizedCap) / capStddev : null,
  }));
}

function buildMetricWindow(rows, range, key, maxPoints = 240) {
  const points = rows.map(row => [row.ts, row[key]]).filter(point => Number.isFinite(point[1]));
  return getRangeWindow(points, range, maxPoints);
}

function dominantRainbowBand(bands) {
  if (!Array.isArray(bands) || !bands.length) return null;
  const counts = new Map();
  for (const band of bands) {
    if (!band || !band.label) continue;
    const entry = counts.get(band.label) || { band, count: 0 };
    entry.count += 1;
    counts.set(band.label, entry);
  }
  return Array.from(counts.values()).sort((a, b) => b.count - a.count)[0]?.band || bands[bands.length - 1] || null;
}

function buildCompositeSeries(rows, pricePoints, range, livePrice, referencePricePoints) {
  const priceWindow = appendLivePrice(pricePoints, livePrice);
  const drawdowns = calcDrawdown(priceWindow.map(point => point[1]));
  const metrics = buildPriceMetricRows(rows, priceWindow, referencePricePoints || priceWindow, livePrice);

  const points = metrics.map((row, index) => {
    const components = [];

    if (Number.isFinite(row.mvrv)) components.push(clamp((row.mvrv - 1.65) * 36, -55, 70));
    if (Number.isFinite(row.mvrvZ)) components.push(clamp((row.mvrvZ - 1.5) * 18, -55, 70));
    if (Number.isFinite(row.price)) {
      const position = powerLawPosition(row.price, row.ts);
      if (Number.isFinite(position)) components.push((position - 50) * 1.18);
      const band = getRainbowBand(row.price, row.ts);
      components.push(band.score);
    }
    const drawdown = drawdowns[index];
    if (Number.isFinite(drawdown)) components.push(drawdown <= -55 ? -42 : drawdown <= -35 ? -26 : drawdown <= -15 ? -10 : 12);

    if (!components.length) return null;
    const score = components.reduce((sum, value) => sum + value, 0) / components.length;
    return [row.ts, clamp(score, -100, 100)];
  }).filter(Boolean);

  return getRangeWindow(points, range, 260);
}

function valuationSignal(score) {

  if (score <= -15) return { label: 'Undervalued', color: '#27e86f', tone: 'cheap' };
  if (score < 20) return { label: 'Fair / Neutral', color: '#ffd43b', tone: 'neutral' };
  if (score < 50) return { label: 'Overvalued', color: '#ff8c00', tone: 'hot' };
  return { label: 'Extreme Overvaluation', color: '#ff4757', tone: 'hot' };
}

globalThis.ValuationPage = function ValuationPage() {

  const [ranges, setRanges] = useState(DEFAULT_RANGES);

  const setRange = useCallback((key, value) => {
    setRanges(prev => ({ ...prev, [key]: value }));
  }, []);

  const { data: liveData, lastUpdated } = useLiveData(async () => {
    const neededRanges = VALUATION_RANGES
      .map(range => range.id)
      .filter(range => range !== 'max');

    const rangeEntriesPromise = Promise.all(neededRanges.map(async (range) => {
      const chart = await fetchMarketChart(getRangeDays(range));
      return [range, chart || { prices: [], source: 'unavailable' }];
    }));

    const [priceResult, coinMetrics, longMarketChart, rangeEntries] = await Promise.all([
      fetchBTCPrice(),
      fetchCoinMetricsValuation(),
      fetchMarketChart('max'),
      rangeEntriesPromise,
    ]);

    return {
      priceResult,
      coinMetrics,
      coinMetricPrices: coinMetrics?.pricePoints || [],
      longPrices: (longMarketChart && longMarketChart.prices) || [],
      longSource: longMarketChart && longMarketChart.source,
      marketByRange: Object.fromEntries(rangeEntries),
    };
  }, 30000, []);

  const btcPrice = streamedPrice || liveData?.priceResult?.price || 0;
  const rawLongPrices = liveData?.longPrices || [];
  const coinMetricPrices = liveData?.coinMetricPrices || [];
  const analysisLongRaw = useMemo(() => (
    hasEnoughRange(rawLongPrices, '5y') ? rawLongPrices : (coinMetricPrices.length ? coinMetricPrices : rawLongPrices)
  ), [rawLongPrices, coinMetricPrices]);
  const longPrices = useMemo(() => appendLivePrice(analysisLongRaw, btcPrice), [analysisLongRaw, btcPrice]);
  const valuationRows = useMemo(() => {
    const rows = liveData?.coinMetrics?.rows || [];
    return addMvrvZ(applyLiveMvrv(rows, coinMetricPrices.length ? coinMetricPrices : rawLongPrices, btcPrice));
  }, [liveData?.coinMetrics, coinMetricPrices, rawLongPrices, btcPrice]);

  const getPriceWindow = useCallback((range) => {
    const rangeChart = liveData?.marketByRange?.[range];
    const fallback = trimSeriesToDays(rawLongPrices, getRangeDays(range));
    const cmFallback = trimSeriesToDays(coinMetricPrices, getRangeDays(range));
    const best = pickBestPriceSource({
      range,
      rangePoints: rangeChart?.prices || [],
      longPoints: fallback,
      coinMetricPoints: cmFallback,
    });
    const window = getRangeWindow(appendLivePrice(best.points, btcPrice), range, range === '1d' ? 288 : 260);
    return {
      ...window,
      source: rangeChart?.prices?.length && best.label === 'range feed'
        ? rangeChart.source
        : best.label,
      spanDays: spanDays(best.points),
    };
  }, [liveData?.marketByRange, rawLongPrices, coinMetricPrices, btcPrice]);

  const compositePriceWindow = useMemo(() => getPriceWindow(ranges.composite), [getPriceWindow, ranges.composite]);
  const compositeWindow = useMemo(
    () => buildCompositeSeries(valuationRows, compositePriceWindow.points, ranges.composite, btcPrice, longPrices),
    [valuationRows, compositePriceWindow, ranges.composite, btcPrice, longPrices]
  );
  const scoreStats = useMemo(() => seriesStats(compositeWindow.values), [compositeWindow.values]);
  const liveScore = scoreStats.latest;
  const selectedScore = scoreStats.average;
  const scoreSignal = valuationSignal(selectedScore);

  const mvrvPriceWindow = useMemo(() => getPriceWindow(ranges.mvrv), [getPriceWindow, ranges.mvrv]);
  const mvrvWindow = useMemo(
    () => buildMetricWindowFromPricePoints(valuationRows, mvrvPriceWindow.points, longPrices, btcPrice, ranges.mvrv, 'mvrv'),
    [valuationRows, mvrvPriceWindow, longPrices, btcPrice, ranges.mvrv]
  );
  const mvrvStats = useMemo(() => seriesStats(mvrvWindow.values), [mvrvWindow.values]);
  const liveMvrv = mvrvStats.latest;
  const selectedMvrv = mvrvStats.average;
  const selectedMvrvSignal = mvrvSignal(selectedMvrv);
  const liveMvrvSignal = mvrvSignal(liveMvrv);

  const mvrvZPriceWindow = useMemo(() => getPriceWindow(ranges.mvrvZ), [getPriceWindow, ranges.mvrvZ]);
  const mvrvZWindow = useMemo(
    () => buildMetricWindowFromPricePoints(valuationRows, mvrvZPriceWindow.points, longPrices, btcPrice, ranges.mvrvZ, 'mvrvZ'),
    [valuationRows, mvrvZPriceWindow, longPrices, btcPrice, ranges.mvrvZ]
  );
  const mvrvZStats = useMemo(() => seriesStats(mvrvZWindow.values), [mvrvZWindow.values]);
  const liveZ = mvrvZStats.latest;
  const selectedZ = mvrvZStats.average;
  const selectedZSignal = zSignal(selectedZ);
  const liveZSignal = zSignal(liveZ);

  const powerWindow = useMemo(() => {
    const window = getPriceWindow(ranges.powerLaw);
    return {
      ...window,
      fair: window.points.map(point => powerLawValue(daysSinceGenesisAt(point[0]))),
      support: window.points.map(point => powerLawValue(daysSinceGenesisAt(point[0])) / 3),
      resistance: window.points.map(point => powerLawValue(daysSinceGenesisAt(point[0])) * 10),
      position: window.points.map(point => powerLawPosition(point[1], point[0])),
    };
  }, [getPriceWindow, ranges.powerLaw]);
  const powerStats = useMemo(() => seriesStats(powerWindow.position), [powerWindow.position]);
  const livePowerPosition = powerStats.latest;
  const selectedPowerPosition = powerStats.average;
  const currentPowerFair = latestFinite(powerWindow.fair);
  const currentPowerSupport = latestFinite(powerWindow.support);
  const currentPowerResistance = latestFinite(powerWindow.resistance);

  const rainbowWindow = useMemo(() => {
    const window = getPriceWindow(ranges.rainbow);
    return {
      ...window,
      bands: RAINBOW_BANDS.map(band => ({
        ...band,
        data: window.points.map(point => rainbowBandValue(point[0], band.coeff, band.offset)),
      })),
      bandHistory: window.points.map(point => getRainbowBand(point[1], point[0])),
    };
  }, [getPriceWindow, ranges.rainbow]);
  const liveBand = rainbowWindow.bandHistory.length ? rainbowWindow.bandHistory[rainbowWindow.bandHistory.length - 1] : RAINBOW_BANDS[4];
  const selectedBand = dominantRainbowBand(rainbowWindow.bandHistory) || liveBand;

  const piWindow = useMemo(() => {
    const longValues = longPrices.map(point => point[1]);
    const sma111 = calcSMA(longValues, 111);
    const sma350x2 = calcSMA(longValues, 350).map(value => value !== null ? value * 2 : null);
    const allPoints = longPrices.map((point, index) => [point[0], {
      price: point[1],
      sma111: sma111[index],
      sma350x2: sma350x2[index],
    }]);
    const visible = downsampleSeries(trimSeriesToDays(allPoints, getRangeDays(ranges.piCycle)), 260);
    return {
      labels: visible.map(point => formatChartDateLabel(point[0], ranges.piCycle)),
      price: visible.map(point => point[1].price),
      sma111: visible.map(point => point[1].sma111),
      sma350x2: visible.map(point => point[1].sma350x2),
      gap: visible.map(point => {
        const latest111 = point[1].sma111;
        const latest350x2 = point[1].sma350x2;
        return latest111 && latest350x2 ? ((latest350x2 - latest111) / latest350x2) * 100 : null;
      }),
    };
  }, [longPrices, ranges.piCycle]);

  const piStats = useMemo(() => seriesStats(piWindow.gap), [piWindow.gap]);
  const livePiGap = piStats.latest;
  const selectedPiGap = piStats.average;
  const latestPi111 = latestFinite(piWindow.sma111);
  const latestPi350x2 = latestFinite(piWindow.sma350x2);
  const selectedPowerColor = Number.isFinite(selectedPowerPosition) && selectedPowerPosition < 30 ? '#00d4aa' : Number.isFinite(selectedPowerPosition) && selectedPowerPosition < 70 ? '#ffd43b' : '#ff4757';
  const livePowerColor = Number.isFinite(livePowerPosition) && livePowerPosition < 30 ? '#00d4aa' : Number.isFinite(livePowerPosition) && livePowerPosition < 70 ? '#ffd43b' : '#ff4757';
  const selectedPiColor = Number.isFinite(selectedPiGap) && selectedPiGap < 5 ? '#ff4757' : Number.isFinite(selectedPiGap) && selectedPiGap < 15 ? '#ffd43b' : '#00d4aa';
  const selectedPiLabel = Number.isFinite(selectedPiGap) && selectedPiGap < 5 ? 'Near Crossover' : Number.isFinite(selectedPiGap) && selectedPiGap < 15 ? 'Converging' : 'No Top Signal';

  const drawdownWindow = useMemo(() => {
    const window = getPriceWindow(ranges.drawdown);
    return { ...window, drawdown: calcDrawdown(window.values) };
  }, [getPriceWindow, ranges.drawdown]);

  const drawdownCurrent = latestFinite(drawdownWindow.drawdown || []);
  const drawdownStats = useMemo(() => seriesStats(drawdownWindow.drawdown || []), [drawdownWindow.drawdown]);
  const rangeHigh = drawdownWindow.values.length ? Math.max(...drawdownWindow.values) : null;
  const latestDate = liveData?.coinMetrics?.latestDate || 'loading';
  const marketSource = liveData?.longSource || liveData?.marketByRange?.[ranges.drawdown]?.source || 'loading';

  return h('div', { className: 'page-enter charts-page valuation-page' },
    h('div', { className: 'charts-hero valuation-hero' },
      h('div', null,
        h('div', { className: 'charts-eyebrow' }, 'Live valuation dashboard'),
        h('h1', null, 'Bitcoin Valuation'),
        h('p', null, 'A live overvalued/undervalued readout built from CoinMetrics MVRV, derived MVRV Z-Score, Power Law range, Rainbow bands, Pi Cycle risk, and live BTC market price.'),
      ),
      h('div', { className: 'charts-live-card' },
        h('span', { className: 'badge badge-success' }, 'LIVE'),
        h('strong', { className: 'tabular-nums' }, btcPrice ? formatUSD(btcPrice, 2) : 'Loading BTC'),
        h('span', { style: { color: 'var(--text-faint)' } }, 'MVRV daily data: ' + latestDate),
        h(LastUpdated, { lastUpdated, live: true }),

    ),

    h('section', { className: 'valuation-score-card' },
      h('div', { className: 'valuation-score-main' },
        h('div', { className: 'charts-eyebrow' }, 'Composite range signal'),
        h('div', { className: 'valuation-score tabular-nums', style: { color: scoreSignal.color } }, Number.isFinite(selectedScore) ? selectedScore.toFixed(0) : '...'),
        h('div', { className: 'valuation-score-label', style: { color: scoreSignal.color } }, scoreSignal.label),
        h('p', null, 'Scores below zero lean undervalued. Scores above zero lean overvalued. This is the ' + rangeName(ranges.composite) + ' average from the visible chart, with the latest live point shown separately. Range move: ' + signedNumber(scoreStats.change, 1, ' pts') + '.'),
        h(ChartRangeControls, { value: ranges.composite, onChange: range => setRange('composite', range), ranges: VALUATION_RANGES, label: 'Composite score timeframe' }),

      h('div', { className: 'valuation-score-side' },
        h(ValuationMeter, { score: selectedScore, signal: scoreSignal }),
        h('div', { className: 'valuation-summary-grid' },
          h('div', { className: 'valuation-mini-card' },
            h('span', null, rangeName(ranges.mvrv) + ' MVRV avg'),
            h('strong', { className: 'tabular-nums', style: { color: selectedMvrvSignal.color } }, formatRangeAverage(selectedMvrv, 'ratio')),
            h('em', null, selectedMvrvSignal.label + ' · live ' + formatRangeAverage(liveMvrv, 'ratio')),
          ),
          h('div', { className: 'valuation-mini-card' },
            h('span', null, rangeName(ranges.mvrvZ) + ' MVRV Z avg'),
            h('strong', { className: 'tabular-nums', style: { color: selectedZSignal.color } }, formatRangeAverage(selectedZ, 'number')),
            h('em', null, selectedZSignal.label + ' · live ' + formatRangeAverage(liveZ, 'number')),
          ),
          h('div', { className: 'valuation-mini-card' },
            h('span', null, rangeName(ranges.powerLaw) + ' Power avg'),
            h('strong', { className: 'tabular-nums', style: { color: selectedPowerColor } }, Number.isFinite(selectedPowerPosition) ? formatPercent(selectedPowerPosition, 0) : '...'),
            h('em', null, 'Live ' + (Number.isFinite(livePowerPosition) ? formatPercent(livePowerPosition, 0) : '...')),
          ),
          h('div', { className: 'valuation-mini-card' },
            h('span', null, rangeName(ranges.rainbow) + ' Rainbow'),
            h('strong', { style: { color: selectedBand.color } }, selectedBand.label),
            h('em', null, 'Live ' + liveBand.label),
          ),
        ),
      ),
    ),

    h('div', { className: 'charts-grid charts-grid-refined' },
      h(ChartPanel, {
        title: 'Composite Valuation',
        subtitle: 'Blends MVRV, MVRV Z, Power Law, Rainbow band, and drawdown into one score',
        badge: scoreSignal.label,
        badgeColor: scoreSignal.color,
        range: ranges.composite,
        onRangeChange: range => setRange('composite', range),
        fullWidth: true,
      },
        compositeWindow.values.length > 1 && h(ChartComponent, {
          key: 'composite-' + ranges.composite,
          type: 'line',
          height: 280,
          data: {
            labels: compositeWindow.labels,
            datasets: [
              lineDataset('Composite Score', compositeWindow.values, scoreSignal.color, { fill: true, backgroundColor: 'rgba(247,147,26,0.12)', borderWidth: 2.7 }),
              lineDataset('Fair Value', compositeWindow.values.map(() => 0), '#ffd43b', { borderWidth: 1, borderDash: [6, 6] }),
              lineDataset('Undervalued', compositeWindow.values.map(() => -35), '#00d4aa', { borderWidth: 1, borderDash: [6, 6] }),
              lineDataset('Overvalued', compositeWindow.values.map(() => 35), '#ff4757', { borderWidth: 1, borderDash: [6, 6] }),
            ],
          },
          options: chartOptions({ mode: 'score', min: -100, max: 100, legend: true }),
        }),
      ),

      h(ChartPanel, {
        title: 'MVRV Ratio',
        subtitle: 'CoinMetrics market cap / realized cap, live-scaled by current BTC price',
        badge: Number.isFinite(selectedMvrv) ? rangeName(ranges.mvrv) + ' avg ' + selectedMvrv.toFixed(2) + 'x' : '...',
        badgeColor: selectedMvrvSignal.color,
        range: ranges.mvrv,
        onRangeChange: range => setRange('mvrv', range),
      },
        h(IndicatorHero, {
          value: formatRangeAverage(selectedMvrv, 'ratio'),
          label: rangeName(ranges.mvrv) + ' Average: ' + selectedMvrvSignal.label,
          color: selectedMvrvSignal.color,
          subvalue: rangeSignalDescription(ranges.mvrv, 'average') + '. Live latest: ' + formatRangeAverage(liveMvrv, 'ratio') + ' (' + liveMvrvSignal.label + ').',
        }),
        mvrvWindow.values.length > 1 && h(ChartComponent, {
          key: 'mvrv-' + ranges.mvrv,
          type: 'line',
          height: 190,
          data: {
            labels: mvrvWindow.labels,
            datasets: [
              lineDataset('MVRV', mvrvWindow.values, '#f7931a', { fill: true, backgroundColor: 'rgba(247,147,26,0.11)' }),
              lineDataset('Realized Value', mvrvWindow.values.map(() => 1), '#00d4aa', { borderWidth: 1, borderDash: [6, 6] }),
              lineDataset('Cycle Heat', mvrvWindow.values.map(() => 2.4), '#ff4757', { borderWidth: 1, borderDash: [6, 6] }),
            ],
          },
          options: chartOptions({ mode: 'ratio', suggestedMin: 0.5, suggestedMax: 3.5, legend: true }),
        }),
        h(StatGrid, { rows: [
          { label: 'Range Average', value: formatRangeAverage(selectedMvrv, 'ratio'), color: selectedMvrvSignal.color, emphasis: true },
          { label: 'Live Latest', value: formatRangeAverage(liveMvrv, 'ratio'), color: liveMvrvSignal.color },
          { label: 'First Visible', value: Number.isFinite(mvrvStats.first) ? mvrvStats.first.toFixed(3) + 'x' : '...' },
          { label: 'Range Change', value: signedNumber(mvrvStats.changePercent, 2, '%'), color: Number.isFinite(mvrvStats.change) && mvrvStats.change < 0 ? '#00d4aa' : '#ff8c00' },
          { label: 'Undervalued', value: '< 1.5x', color: '#00d4aa' },
        ] }),
      ),

      h(ChartPanel, {
        title: 'MVRV Z-Score',
        subtitle: 'Traditional market cap minus realized cap divided by market-cap standard deviation',
        badge: Number.isFinite(selectedZ) ? rangeName(ranges.mvrvZ) + ' avg ' + selectedZ.toFixed(2) : '...',
        badgeColor: selectedZSignal.color,
        range: ranges.mvrvZ,
        onRangeChange: range => setRange('mvrvZ', range),
      },
        h(IndicatorHero, {
          value: formatRangeAverage(selectedZ, 'number'),
          label: rangeName(ranges.mvrvZ) + ' Average: ' + selectedZSignal.label,
          color: selectedZSignal.color,
          subvalue: rangeSignalDescription(ranges.mvrvZ, 'average') + '. Live latest: ' + formatRangeAverage(liveZ, 'number') + ' (' + liveZSignal.label + ').',
        }),
        mvrvZWindow.values.length > 1 && h(ChartComponent, {
          key: 'mvrvz-' + ranges.mvrvZ,
          type: 'line',
          height: 190,
          data: {
            labels: mvrvZWindow.labels,
            datasets: [
              lineDataset('MVRV Z', mvrvZWindow.values, '#8b5cf6', { fill: true, backgroundColor: 'rgba(139,92,246,0.12)' }),
              lineDataset('Discount', mvrvZWindow.values.map(() => 0), '#00d4aa', { borderWidth: 1, borderDash: [6, 6] }),
              lineDataset('Hot Zone', mvrvZWindow.values.map(() => 3), '#ff4757', { borderWidth: 1, borderDash: [6, 6] }),
            ],
          },
          options: chartOptions({ suggestedMin: -1, suggestedMax: 5, legend: true }),
        }),
        h(StatGrid, { rows: [
          { label: 'Range Average', value: formatRangeAverage(selectedZ, 'number'), color: selectedZSignal.color, emphasis: true },
          { label: 'Live Latest', value: formatRangeAverage(liveZ, 'number'), color: liveZSignal.color },
          { label: 'First Visible', value: Number.isFinite(mvrvZStats.first) ? mvrvZStats.first.toFixed(3) : '...' },
          { label: 'Range Change', value: signedNumber(mvrvZStats.change, 2, ' pts'), color: Number.isFinite(mvrvZStats.change) && mvrvZStats.change < 0 ? '#00d4aa' : '#ff8c00' },
        ] }),
      ),

      h(ChartPanel, {
        title: 'Power Law Valuation',
        subtitle: 'BTC price versus long-term support, fair value, and resistance bands',
        badge: Number.isFinite(selectedPowerPosition) ? rangeName(ranges.powerLaw) + ' avg ' + formatPercent(selectedPowerPosition, 0) : '...',
        badgeColor: selectedPowerColor,
        range: ranges.powerLaw,
        onRangeChange: range => setRange('powerLaw', range),
        fullWidth: true,
      },
        h('div', { className: 'chart-split-header' },
          h(IndicatorHero, {
            value: Number.isFinite(selectedPowerPosition) ? formatPercent(selectedPowerPosition, 1) : '...',
            label: rangeName(ranges.powerLaw) + ' Average Position',
            color: selectedPowerColor,
            subvalue: 'Live latest: ' + (Number.isFinite(livePowerPosition) ? formatPercent(livePowerPosition, 1) : '...') + '. Range position change: ' + signedNumber(powerStats.change, 1, ' pts') + '. Lower means closer to support.',
          }),
          h(StatGrid, { rows: [
            { label: 'Range Average', value: Number.isFinite(selectedPowerPosition) ? formatPercent(selectedPowerPosition, 1) : '...', color: selectedPowerColor, emphasis: true },
            { label: 'Live Latest', value: Number.isFinite(livePowerPosition) ? formatPercent(livePowerPosition, 1) : '...', color: livePowerColor },
            { label: 'Current Price', value: btcPrice ? formatUSD(btcPrice, 0) : '...', color: 'var(--btc-orange)', emphasis: true },
            { label: 'Support Band', value: formatUSD(currentPowerSupport, 0), color: '#00d4aa' },
            { label: 'Fair Value', value: formatUSD(currentPowerFair, 0), color: '#ffd43b' },
          ] }),
        ),
        powerWindow.values.length > 1 && h(ChartComponent, {
          key: 'power-' + ranges.powerLaw,
          type: 'line',
          height: 310,
          data: {
            labels: powerWindow.labels,
            datasets: [
              lineDataset('Resistance', powerWindow.resistance, '#ff4757', { borderWidth: 1.5, borderDash: [8, 5] }),
              lineDataset('Fair Value', powerWindow.fair, '#ffd43b', { borderWidth: 2 }),
              lineDataset('Support', powerWindow.support, '#00d4aa', { borderWidth: 1.5, borderDash: [8, 5] }),
              lineDataset('BTC Price', powerWindow.values, '#f7931a', { borderWidth: 2.8 }),
            ],
          },
          options: chartOptions({ yType: 'logarithmic', mode: 'currency', legend: true }),
        }),
      ),

      h(ChartPanel, {
        title: 'Rainbow Valuation Bands',
        subtitle: 'Logarithmic color bands with live BTC price overlay',
        badge: rangeName(ranges.rainbow) + ' mode: ' + selectedBand.label,
        badgeColor: selectedBand.color,
        range: ranges.rainbow,
        onRangeChange: range => setRange('rainbow', range),
        fullWidth: true,
      },
        h('div', { className: 'chart-split-header' },
          h(IndicatorHero, {
            value: selectedBand.label,
            label: rangeName(ranges.rainbow) + ' Dominant Band',
            color: selectedBand.color,
            subvalue: 'Most common band across the selected visible chart. Live latest: ' + liveBand.label + '.',
          }),
          h(StatGrid, { rows: [
            { label: 'Range Dominant', value: selectedBand.label, color: selectedBand.color, emphasis: true },
            { label: 'Live Latest Band', value: liveBand.label, color: liveBand.color },
            { label: 'BTC Latest', value: rainbowWindow.values.length ? formatUSD(rainbowWindow.values[rainbowWindow.values.length - 1], 0) : '...', color: 'var(--btc-orange)' },
            { label: 'Top Band Latest', value: rainbowWindow.bands?.[0]?.data?.length ? formatUSD(rainbowWindow.bands[0].data[rainbowWindow.bands[0].data.length - 1], 0) : '...', color: RAINBOW_BANDS[0].color },
            { label: 'Bottom Band Latest', value: rainbowWindow.bands?.[8]?.data?.length ? formatUSD(rainbowWindow.bands[8].data[rainbowWindow.bands[8].data.length - 1], 0) : '...', color: RAINBOW_BANDS[8].color },
          ] }),
        ),
        rainbowWindow.values.length > 1 && h(ChartComponent, {
          key: 'rainbow-' + ranges.rainbow,
          type: 'line',
          height: 320,
          data: {

            datasets: [
              ...rainbowWindow.bands.map((band, index) => lineDataset(band.label, band.data, band.color, { borderWidth: index === 4 ? 1.7 : 1.15, tension: 0.18 })),
              lineDataset('BTC Price', rainbowWindow.values, '#ffffff', { borderWidth: 2.8, tension: 0.18 }),
            ],
          },
          options: chartOptions({ yType: 'logarithmic', mode: 'currency', legend: true }),
        }),
      ),

      h(ChartPanel, {
        title: 'Pi Cycle Top Risk',
        subtitle: '111DMA versus 350DMA x2 top-signal distance',
        badge: Number.isFinite(selectedPiGap) ? rangeName(ranges.piCycle) + ' avg ' + formatPercent(selectedPiGap, 1) + ' gap' : '...',
        badgeColor: selectedPiColor,
        range: ranges.piCycle,
        onRangeChange: range => setRange('piCycle', range),
      },
        h(IndicatorHero, {
          value: Number.isFinite(selectedPiGap) ? formatPercent(selectedPiGap, 2) : '...',
          label: rangeName(ranges.piCycle) + ' Average: ' + selectedPiLabel,
          color: selectedPiColor,
          subvalue: 'Live latest: ' + (Number.isFinite(livePiGap) ? formatPercent(livePiGap, 2) : '...') + '. Range gap change: ' + signedNumber(piStats.change, 2, ' pts') + '. Top risk rises as the averages converge.',
        }),
        piWindow.price.length > 1 && h(ChartComponent, {
          key: 'pi-' + ranges.piCycle,
          type: 'line',
          height: 215,
          data: {
            labels: piWindow.labels,
            datasets: [
              lineDataset('BTC Price', piWindow.price, 'rgba(255,255,255,0.45)', { borderWidth: 1.3 }),
              lineDataset('111DMA', piWindow.sma111, '#f7931a', { borderWidth: 2 }),
              lineDataset('350DMA x2', piWindow.sma350x2, '#00d4aa', { borderWidth: 2, borderDash: [7, 4] }),
            ],
          },
          options: chartOptions({ yType: 'logarithmic', mode: 'currency', legend: true }),
        }),
        h(StatGrid, { rows: [
          { label: 'Range Average Gap', value: Number.isFinite(selectedPiGap) ? formatPercent(selectedPiGap, 2) : '...', color: selectedPiColor, emphasis: true },
          { label: 'Live Latest Gap', value: Number.isFinite(livePiGap) ? formatPercent(livePiGap, 2) : '...' },
          { label: '111DMA', value: latestPi111 ? formatUSD(latestPi111, 0) : '...', color: '#f7931a' },
          { label: '350DMA x2', value: latestPi350x2 ? formatUSD(latestPi350x2, 0) : '...', color: '#00d4aa' },
          { label: 'Range Change', value: signedNumber(piStats.change, 2, ' pts'), color: Number.isFinite(piStats.change) && piStats.change < 0 ? '#ff8c00' : '#00d4aa' },
        ] }),
      ),

      h(ChartPanel, {

async function tryFetch(url, timeoutMs = 8000) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) return null;
    const contentType = res.headers.get('content-type') || '';
    return contentType.includes('json') ? await res.json() : await res.text();
  } catch {
    return null;
  }
}

}

function getFearGreedLimit(range) {
  const days = getRangeDays(range);
  if (days === 'max') return 0;
  return Math.max(30, Math.min(1825, Math.ceil(days) + 1));
}

function daysSinceGenesisAt(timestamp) {
  return Math.max(1, Math.floor((timestamp - BTC_GENESIS.getTime()) / DAY_MS));
}

function daysSinceGenesisNow() {
  return daysSinceGenesisAt(Date.now());
}

function calcSMA(values, period) {
  const result = [];
  let rolling = 0;
  for (let i = 0; i < values.length; i += 1) {
    rolling += values[i];
    if (i >= period) rolling -= values[i - period];
    result.push(i >= period - 1 ? rolling / period : null);
  }
  return result;
}

function calcRSI(values, period = 14) {
  if (!Array.isArray(values) || values.length < period + 1) return values.map(() => null);

  const result = Array(period).fill(null);
  let gainSum = 0;
  let lossSum = 0;

  for (let i = 1; i <= period; i += 1) {
    const change = values[i] - values[i - 1];
    if (change >= 0) gainSum += change;
    else lossSum += Math.abs(change);
  }

  let avgGain = gainSum / period;
  let avgLoss = lossSum / period;
  result.push(avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss));

  for (let i = period + 1; i < values.length; i += 1) {
    const change = values[i] - values[i - 1];
    const gain = change > 0 ? change : 0;
    const loss = change < 0 ? Math.abs(change) : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    result.push(avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss));
  }

  return result;
}

function calcMVRVRatio(values, period = 200) {
  const basis = calcSMA(values, period);
  return values.map((value, index) => {
    const costBasis = basis[index];
    return costBasis && costBasis > 0 ? value / costBasis : null;
  });
}

function calcZScore(values) {
  const valid = values.filter(value => Number.isFinite(value));
  if (!valid.length) return values.map(() => null);
  const mean = valid.reduce((sum, value) => sum + value, 0) / valid.length;
  const variance = valid.reduce((sum, value) => sum + (value - mean) ** 2, 0) / valid.length;
  const stddev = Math.sqrt(variance);
  if (!stddev) return values.map(() => null);
  return values.map(value => Number.isFinite(value) ? (value - mean) / stddev : null);
}

function calcDrawdown(values) {
  let peak = -Infinity;
  return values.map(value => {
    peak = Math.max(peak, value);
    return peak > 0 ? ((value - peak) / peak) * 100 : 0;
  });
}

function latestFinite(values) {
  for (let i = values.length - 1; i >= 0; i -= 1) {
    if (Number.isFinite(values[i])) return values[i];
  }
  return null;
}

function appendLivePrice(points, livePrice) {
  if (!Array.isArray(points) || !points.length) return livePrice ? [[Date.now(), livePrice]] : [];
  if (!livePrice) return points;

  const next = points.slice();
  const now = Date.now();
  const last = next[next.length - 1];
  const lastDate = last ? new Date(last[0]) : null;
  const nowDate = new Date(now);
  const sameUtcDay = lastDate
    && lastDate.getUTCFullYear() === nowDate.getUTCFullYear()
    && lastDate.getUTCMonth() === nowDate.getUTCMonth()
    && lastDate.getUTCDate() === nowDate.getUTCDate();

  if (sameUtcDay) next[next.length - 1] = [last[0], livePrice];
  else next.push([now, livePrice]);
  return next;
}

function buildRangeWindow(points, range, livePrice, maxPoints = 240) {
  const livePoints = appendLivePrice(points, livePrice);
  const trimmed = trimSeriesToDays(livePoints, getRangeDays(range));
  const sampled = downsampleSeries(trimmed, maxPoints);
  return {
    points: sampled,
    labels: sampled.map(point => formatChartDateLabel(point[0], range)),
    values: sampled.map(point => point[1]),
  };
}

function sampledIndexesForRange(points, range, maxPoints = 240) {
  const visible = trimSeriesToDays(points, getRangeDays(range));
  const start = Math.max(0, points.length - visible.length);
  const indexes = visible.map((_, index) => start + index);
  if (indexes.length <= maxPoints) return indexes;

  const step = Math.ceil(indexes.length / maxPoints);
  const sampled = indexes.filter((_, index) => index % step === 0);
  const last = indexes[indexes.length - 1];
  if (sampled[sampled.length - 1] !== last) sampled.push(last);
  return sampled;
}

function buildVisibleSeries(points, range, seriesMap, maxPoints = 240) {
  const indexes = sampledIndexesForRange(points, range, maxPoints);
  return {
    indexes,
    labels: indexes.map(index => formatChartDateLabel(points[index][0], range)),
    series: Object.fromEntries(Object.entries(seriesMap).map(([key, values]) => [

}

function rainbowBandValue(timestamp, coeff, offset) {
  const dayIndex = Math.max(1, Math.floor((timestamp - RAINBOW_BASE_DATE.getTime()) / DAY_MS));
  return Math.pow(10, coeff * Math.log(dayIndex + offset) + RAINBOW_INTERCEPT);
}

function powerLawValue(daysSinceGenesis) {
  return Math.exp(POWER_LAW_SLOPE * Math.log(daysSinceGenesis) + POWER_LAW_INTERCEPT);
}

function getRainbowBand(price, timestamp) {
  for (let i = 0; i < RAINBOW_BANDS.length - 1; i += 1) {
    const upper = rainbowBandValue(timestamp, RAINBOW_BANDS[i].coeff, RAINBOW_BANDS[i].offset);
    const lower = rainbowBandValue(timestamp, RAINBOW_BANDS[i + 1].coeff, RAINBOW_BANDS[i + 1].offset);
    if (price >= lower && price <= upper) return RAINBOW_BANDS[i + 1];
  }
  const lowest = rainbowBandValue(timestamp, RAINBOW_BANDS[RAINBOW_BANDS.length - 1].coeff, RAINBOW_BANDS[RAINBOW_BANDS.length - 1].offset);
  return price < lowest ? RAINBOW_BANDS[RAINBOW_BANDS.length - 1] : RAINBOW_BANDS[0];
}

function formatAxisDollar(value) {

  return '$' + n.toFixed(0);
}

function formatAxisNumber(value) {

(() => {

   Market Pulse - Sentiment, News, Mining
   Live public feeds: Alternative.me, Google News, mempool.space
   ============================================ */

const React = window.React;
const { createElement: h, useState, useMemo } = React;

const SENTIMENT_RANGES = [
  { id: '1w', label: '1W', days: 7, description: 'Past week' },
  { id: '1m', label: '1M', days: 30, description: 'Past month' },
  { id: '3m', label: '3M', days: 90, description: 'Past 3 months' },
  { id: '6m', label: '6M', days: 180, description: 'Past 6 months' },
  { id: '1y', label: '1Y', days: 365, description: 'Past year' },
  { id: 'max', label: 'MAX', days: 0, description: 'All available Alternative.me history' },
];

const MINING_RANGES = [
  { id: '3d', label: '3D', description: 'Past 3 days' },
  { id: '1w', label: '1W', description: 'Past week' },
  { id: '1m', label: '1M', description: 'Past month' },
  { id: '3m', label: '3M', description: 'Past 3 months' },
  { id: '6m', label: '6M', description: 'Past 6 months' },
  { id: '1y', label: '1Y', description: 'Past year' },
];

function rangeToFearGreedLimit(range) {
  const found = SENTIMENT_RANGES.find(item => item.id === range);
  if (!found) return 365;
  return found.id === 'max' ? 0 : Math.max(10, found.days + 1);
}

function formatDifficulty(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return '—';
  return formatNumber(n / 1e12, 2) + ' T';
}

function formatDuration(ms) {
  const totalSeconds = Math.max(0, Math.floor(Number(ms) / 1000));
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  if (days > 0) return days + 'd ' + hours + 'h';
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  return hours + 'h ' + minutes + 'm';
}

function sentimentColor(value) {
  if (value >= 75) return '#ff4757';
  if (value >= 55) return '#ffa502';
  if (value >= 45) return '#ffd166';
  if (value >= 25) return '#f7931a';
  return '#00d4aa';
}

function sentimentHint(value) {
  if (value >= 75) return 'Extreme greed usually means the market is very hot and risk is elevated.';
  if (value >= 55) return 'Greed means momentum is positive, but sentiment may be getting crowded.';
  if (value >= 45) return 'Neutral means sentiment is balanced between fear and greed.';
  if (value >= 25) return 'Fear means investors are cautious; historically this can create better risk/reward.';
  return 'Extreme fear means sentiment is washed out, but price can still stay volatile.';
}

function pulseChartOptions({ min = 0, max = 100, mode = 'number' } = {}) {
  return {
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: function(ctx) {
            if (mode === 'percent') return ctx.dataset.label + ': ' + formatPercent(ctx.raw, 2);
            if (mode === 'hashrate') return ctx.dataset.label + ': ' + formatHashrate(ctx.raw);
            if (mode === 'difficulty') return ctx.dataset.label + ': ' + ctx.raw.toFixed(2) + ' T';
            return ctx.dataset.label + ': ' + ctx.raw;
          },
        },
      },
    },
    scales: {
      y: {
        min,
        max,
        grid: { color: 'rgba(255,183,77,0.055)', drawBorder: false },
        ticks: {
          color: '#806f62',
          font: { family: 'Inter', size: 11 },
          callback: function(value) {
            if (mode === 'hashrate') return value + ' EH/s';
            if (mode === 'difficulty') return value + 'T';
            if (mode === 'percent') return value + '%';
            return value;
          },
        },
        border: { display: false },
      },
      x: {
        grid: { display: false },
        ticks: { color: '#806f62', font: { family: 'Inter', size: 10 }, maxTicksLimit: 6 },
        border: { display: false },
      },
    },
  };
}

(() => {
/* ============================================
   Bitcoin Analytics - Main App Component
   Hash-based router, layout orchestration
   ============================================ */

const React = window.React;
const { createElement: h, useState, useEffect, useCallback } = React;

// Route configuration
const routes = {
  home: { component: HomePage, title: 'Home' },
  dashboard: { component: DashboardPage, title: 'Dashboard' },
  strategy: { component: StrategyPage, title: 'MicroStrategy Bitcoin Holdings' },
  ownership: { component: OwnershipPage, title: 'Ownership Distribution' },
  supply: { component: SupplyPage, title: 'Supply Countdown' },
  'price-tracker': { component: PriceTrackerPage, title: 'Bitcoin Price Tracker' },
  'etf-flows': { component: EtfFlowsPage, title: 'Bitcoin ETF Flows' },
  dominance: { component: DominancePage, title: 'Bitcoin Dominance' },
  whales: { component: WhalePage, title: 'Whale Tracker' },
  pyramid: { component: PyramidPage, title: 'Wealth Pyramid' },
  'available-supply': { component: AvailableSupplyPage, title: 'Available Supply' },
  valuation: { component: ValuationPage, title: 'Bitcoin Valuation' },
  charts: { component: ChartsPage, title: 'Charts' },
  'market-pulse': { component: MarketPulsePage, title: 'Market Pulse' },
  'halving-countdown': { component: HalvingCountdownPage, title: 'Halving Countdown' },
};

function getHashRoute() {
  const hash = window.location.hash.replace('#', '') || 'home';
  return routes[hash] ? hash : 'home';
}

globalThis.App = function App() {
  const [currentPage, setCurrentPage] = useState(getHashRoute);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Listen for hash changes
  useEffect(() => {
    const onHashChange = () => {
      const route = getHashRoute();
      setCurrentPage(route);
      setSidebarOpen(false);
      // Scroll main content to top
      const main = document.querySelector('.main-content');
      if (main) main.scrollTop = 0;
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const navigate = useCallback((page) => {
    window.location.hash = '#' + page;
  }, []);

  const toggleSidebar = useCallback(() => {
    setSidebarOpen(prev => !prev);
  }, []);

  const closeSidebar = useCallback(() => {
    setSidebarOpen(false);
  }, []);

  // Get current page component
  const route = routes[currentPage] || routes.home;
  const PageComponent = route.component;

  // Update document title
  useEffect(() => {
    document.title = route.title + ' | Bitcoin Pulse';
  }, [route.title]);

  return h('div', { className: 'dashboard-layout' },
    h(Navbar, {
      currentPage,
      onNavigate: navigate,
      onToggleSidebar: toggleSidebar,
    }),
    h(MobileOverlay, { isOpen: sidebarOpen, onClose: closeSidebar }),
    h(Sidebar, {
      currentPage,
      onNavigate: navigate,
      isOpen: sidebarOpen,
      onClose: closeSidebar,
    }),
    h('main', { className: 'main-content' },
      h(PageComponent, { onNavigate: navigate }),
      h(Footer),
    ),
  );
}

})();

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(globalThis.App));
</script>
