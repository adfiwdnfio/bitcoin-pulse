<!-- Custom Styles -->
<style>
/* ============================================
   Bitcoin Analytics Dashboard - Design Tokens
   ============================================ */

:root {
  /* Color System */
  --bg-primary: #050405;
  --bg-secondary: #0d0907;
  --bg-tertiary: #171018;
  --bg-card: #15100c;
  --bg-card-soft: rgba(21, 16, 12, 0.74);
  --bg-panel: rgba(12, 9, 8, 0.78);
  --border-subtle: rgba(255, 183, 77, 0.10);
  --border-hover: rgba(255, 183, 77, 0.22);

  /* Bitcoin Orange Accent */
  --btc-orange: #f7931a;
  --btc-orange-dark: #ff6b00;
  --btc-orange-glow: rgba(247, 147, 26, 0.15);
  --btc-orange-glow-strong: rgba(247, 147, 26, 0.3);
  --violet: #8b5cf6;
  --violet-glow: rgba(139, 92, 246, 0.18);

  /* Text Hierarchy */
  --text-primary: #ffffff;
  --text-muted: #a0a0b8;
  --text-faint: #6b6b80;

  /* Semantic */
  --success: #00d4aa;
  --success-bg: rgba(0, 212, 170, 0.1);
  --error: #ff4757;
  --error-bg: rgba(255, 71, 87, 0.1);
  --warning: #ffa502;
  --info: #3b82f6;

  /* Spacing (4px system) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;

  /* Type Scale */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-5xl: 3rem;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;

  /* Shadows */
  --shadow-card: 0 18px 50px rgba(0, 0, 0, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.035);
  --shadow-elevated: 0 24px 80px rgba(0, 0, 0, 0.52);
  --glow-orange: 0 0 20px rgba(247, 147, 26, 0.15);
  --glow-orange-strong: 0 0 30px rgba(247, 147, 26, 0.25);

  /* Layout */
  --sidebar-width: 240px;
  --navbar-height: 60px;

  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* ============================================
   Base Reset & Typography
   ============================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color-scheme: dark;
  background-color: #050405;
}

body {
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: var(--text-base);
  line-height: 1.6;
  color: var(--text-primary);
  background:
    radial-gradient(circle at 18% -8%, rgba(247, 147, 26, 0.16), transparent 34%),
    radial-gradient(circle at 82% 4%, rgba(139, 92, 246, 0.12), transparent 30%),
    linear-gradient(180deg, #070504 0%, #050405 42%, #08060a 100%);
  background-color: #050405;
}

/* Tabular numbers for all data */
.tabular-nums {
  font-variant-numeric: tabular-nums lining-nums;
}

/* ============================================
   Scrollbar Styling
   ============================================ */

::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.2);
}

/* ============================================
   Dashboard Layout
   ============================================ */

#root {
  height: 100%;
}

.dashboard-layout {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  grid-template-rows: var(--navbar-height) 1fr;
  height: 100dvh;
  overflow: hidden;
}

.navbar {
  grid-column: 1 / -1;
  grid-row: 1;
  position: sticky;
  top: 0;
  z-index: 50;
  background:
    linear-gradient(90deg, rgba(8, 6, 5, 0.94), rgba(17, 10, 6, 0.90)),
    radial-gradient(circle at 12% 0%, rgba(247, 147, 26, 0.12), transparent 30%);
  border-bottom: 1px solid rgba(247, 147, 26, 0.14);
  box-shadow: 0 16px 45px rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: flex;
  align-items: center;
  padding: 0 var(--space-6);
  gap: var(--space-4);
}

.sidebar {
  grid-row: 2;
  grid-column: 1;
  background:
    radial-gradient(circle at 0% 8%, rgba(247, 147, 26, 0.12), transparent 32%),
    radial-gradient(circle at 100% 32%, rgba(139, 92, 246, 0.08), transparent 34%),
    linear-gradient(180deg, rgba(14, 10, 8, 0.96), rgba(8, 6, 8, 0.98));
  border-right: 1px solid rgba(247, 147, 26, 0.12);
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: var(--space-4) 0;
  display: flex;
  flex-direction: column;
}

.main-content {
  grid-row: 2;
  grid-column: 2;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: var(--space-8);
  background:
    radial-gradient(circle at 8% 0%, rgba(247, 147, 26, 0.10), transparent 28%),
    radial-gradient(circle at 94% 10%, rgba(139, 92, 246, 0.10), transparent 28%),
    linear-gradient(180deg, rgba(10, 7, 6, 0.50), rgba(5, 4, 5, 0.20));
}

/* ============================================
   Card System
   ============================================ */

.card {
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.042), rgba(255, 255, 255, 0.012) 48%, transparent),
    radial-gradient(circle at 100% 0%, rgba(247, 147, 26, 0.085), transparent 32%),
    var(--bg-card);
  border: 1px solid rgba(247, 147, 26, 0.12);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  box-shadow: var(--shadow-card);
  transition: border-color var(--duration-normal) var(--ease-out),
              box-shadow var(--duration-normal) var(--ease-out),
              transform var(--duration-normal) var(--ease-out);
}

.card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-elevated), 0 0 34px rgba(247, 147, 26, 0.07);
}

.card-interactive:hover {
  border-color: rgba(247, 147, 26, 0.32);
  box-shadow: var(--glow-orange);
  transform: translateY(-2px);
  cursor: pointer;
}

.card-glow {
  position: relative;
}

.card-glow::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(247, 147, 26, 0.2), rgba(139, 92, 246, 0.12), transparent 58%);
  z-index: -1;
  opacity: 0;
  transition: opacity var(--duration-normal) var(--ease-out);
}

.card-glow:hover::before {
  opacity: 1;
}

/* ============================================
   KPI Card
   ============================================ */

.kpi-card {
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.012)),
    radial-gradient(circle at 100% 0%, rgba(247, 147, 26, 0.12), transparent 34%),
    var(--bg-card);
  border: 1px solid rgba(247, 147, 26, 0.12);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-card);
  transition: all var(--duration-normal) var(--ease-out);
}

.kpi-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-elevated), var(--glow-orange);
  transform: translateY(-1px);
}

.kpi-label {
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-2);
}

.kpi-value {
  font-size: var(--text-2xl);
  font-weight: 850;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums lining-nums;
  line-height: 1.2;
  letter-spacing: -0.04em;
}

.kpi-delta {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-xs);
  font-weight: 600;
  margin-top: var(--space-2);
  font-variant-numeric: tabular-nums;
}

.kpi-delta.positive { color: var(--success); }
.kpi-delta.negative { color: var(--error); }

/* ============================================
   Navigation
   ============================================ */

.nav-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin: 2px 10px;
  padding: var(--space-3) var(--space-4);
  color: var(--text-muted);
  text-decoration: none;
  font-size: var(--text-sm);
  font-weight: 650;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  user-select: none;
}

.nav-item:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.035);
  border-color: rgba(255, 255, 255, 0.055);
}

.nav-item.active {
  color: var(--btc-orange);
  background:
    radial-gradient(circle at 0% 50%, rgba(247, 147, 26, 0.18), transparent 56%),
    rgba(247, 147, 26, 0.07);
  border-color: rgba(247, 147, 26, 0.28);
  box-shadow: inset 3px 0 0 rgba(247, 147, 26, 0.72), 0 0 22px rgba(247, 147, 26, 0.06);
}

.nav-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.nav-section-label {
  font-size: var(--text-xs);
  font-weight: 800;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  padding: var(--space-5) var(--space-5) var(--space-2);
}

/* ============================================
   Price Ticker
   ============================================ */

.price-ticker {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-variant-numeric: tabular-nums lining-nums;
  padding: 7px 11px;
  border: 1px solid rgba(247, 147, 26, 0.14);
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.23);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
}

.price-ticker .price {
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text-primary);
}

.price-ticker .change {
  font-size: var(--text-xs);
  font-weight: 600;
}

.price-ticker .change.up { color: var(--success); }
.price-ticker .change.down { color: var(--error); }

/* ============================================
   Buttons
   ============================================ */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: 999px;
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--duration-fast) var(--ease-out);
  text-decoration: none;
  line-height: 1.5;
}

.btn-primary {
  background: linear-gradient(135deg, #ffbd59, var(--btc-orange) 52%, #ff6b00);
  color: #180b02;
  border-color: rgba(255, 197, 104, 0.72);
  box-shadow: 0 10px 28px rgba(247, 147, 26, 0.18);
}

.btn-primary:hover {
  background: linear-gradient(135deg, #ffd18a, var(--btc-orange) 48%, var(--btc-orange-dark));
  box-shadow: var(--glow-orange-strong);
  transform: translateY(-1px);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.035);
  color: var(--text-primary);
  border-color: rgba(247, 147, 26, 0.18);
}

.btn-secondary:hover {
  background: rgba(247, 147, 26, 0.08);
  border-color: rgba(247, 147, 26, 0.34);
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: none;
  padding: var(--space-2);
}

.btn-ghost:hover {
  color: var(--text-primary);
  background: rgba(247, 147, 26, 0.07);
}

.btn-sm {
  padding: var(--space-1) var(--space-3);
  font-size: var(--text-xs);
}

.btn-lg {
  padding: var(--space-3) var(--space-6);
  font-size: var(--text-base);
}

/* ============================================
   Form Controls
   ============================================ */

.input {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  background: rgba(0, 0, 0, 0.22);
  border: 1px solid rgba(247, 147, 26, 0.14);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: inherit;
  font-size: var(--text-sm);
  transition: all var(--duration-fast) var(--ease-out);
  outline: none;
}

.input:focus {
  border-color: var(--btc-orange);
  box-shadow: 0 0 0 3px var(--btc-orange-glow);
}

.input::placeholder {
  color: var(--text-faint);
}

/* Range slider */
.range-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, rgba(247, 147, 26, 0.32), rgba(139, 92, 246, 0.22));
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.range-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--btc-orange);
  cursor: pointer;
  box-shadow: 0 0 10px rgba(247, 147, 26, 0.3);
  transition: transform var(--duration-fast) var(--ease-out);
}

.range-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

/* ============================================
   Toggle / Tab Controls
   ============================================ */

.tab-group {
  display: inline-flex;
  background: rgba(0, 0, 0, 0.22);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 999px;
  padding: 3px;
  gap: 2px;
}

.tab-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: 999px;
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--text-muted);
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--duration-fast) var(--ease-out);
}

.tab-btn:hover {
  color: var(--text-primary);
}

.tab-btn.active {
  background: linear-gradient(135deg, #ffbd59, var(--btc-orange));
  color: #170b02;
  font-weight: 600;
}

.chart-range-controls {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  max-width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: rgba(0, 0, 0, 0.24);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 999px;
  padding: 3px;
}

.chart-range-controls::-webkit-scrollbar {
  display: none;
}

.chart-range-controls .tab-btn {
  flex: 0 0 auto;
  padding: 7px 10px;
  font-size: var(--text-xs);
}

/* ============================================
   Tables
   ============================================ */

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
  font-variant-numeric: tabular-nums lining-nums;
}

.data-table thead th {
  text-align: left;
  padding: var(--space-3) var(--space-4);
  font-weight: 600;
  color: var(--text-faint);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border-subtle);
  position: sticky;
  top: 0;
  background: #130d09;
  z-index: 1;
}

.data-table tbody td {
  padding: var(--space-3) var(--space-4);
  color: var(--text-muted);
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.data-table tbody tr:hover td {
  background: rgba(247, 147, 26, 0.045);
  color: var(--text-primary);
}

/* ============================================
   Global Section Header
   ============================================ */

.page-header-shell {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: var(--space-5);
  align-items: end;
  margin-bottom: 28px;
  padding: clamp(20px, 4vw, 30px);
  overflow: hidden;
  border: 1px solid rgba(247, 147, 26, 0.18);
  border-radius: var(--radius-xl);
  background:
    radial-gradient(circle at 12% 8%, rgba(247, 147, 26, 0.24), transparent 34%),
    radial-gradient(circle at 96% 0%, rgba(139, 92, 246, 0.18), transparent 32%),
    linear-gradient(135deg, rgba(21, 15, 10, 0.96), rgba(7, 6, 8, 0.98));
  box-shadow: var(--shadow-card), 0 0 46px rgba(247, 147, 26, 0.08);
}

.page-header-shell::after {
  content: '';
  position: absolute;
  inset: auto -70px -170px auto;
  width: 360px;
  height: 360px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(247, 147, 26, 0.16), transparent 68%);
  pointer-events: none;
}

.page-header-copy {
  position: relative;
  z-index: 1;
  min-width: 0;
}

.page-eyebrow {
  color: var(--btc-orange);
  font-size: var(--text-xs);
  font-weight: 850;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 9px;
}

.page-header-title-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.page-header-title {
  margin: 0;
  font-size: clamp(2rem, 5vw, 4.25rem);
  line-height: 0.95;
  font-weight: 900;
  letter-spacing: -0.065em;
  color: var(--text-primary);
}

.page-header-description {
  max-width: 780px;
  margin-top: 12px;
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.68;
}

.page-header-chip {
  position: relative;
  z-index: 1;
  align-self: stretch;
  min-width: 178px;
  display: grid;
  align-content: center;
  gap: 5px;
  padding: 15px;
  border: 1px solid rgba(255,255,255,0.075);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(180deg, rgba(0, 0, 0, 0.30), rgba(0, 0, 0, 0.18)),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 18px);
}

.page-header-chip span {
  color: var(--text-faint);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.page-header-chip strong {
  color: var(--btc-orange);
  font-size: var(--text-base);
}

/* ============================================
   Skeleton Loading
   ============================================ */

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.skeleton {
  background: linear-gradient(90deg,
    var(--bg-tertiary) 25%,
    rgba(255, 255, 255, 0.06) 50%,
    var(--bg-tertiary) 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

.skeleton-text {
  height: 16px;
  margin-bottom: var(--space-2);
}

.skeleton-heading {
  height: 28px;
  width: 60%;
  margin-bottom: var(--space-3);
}

.skeleton-chart {
  height: 200px;
  border-radius: var(--radius-md);
}

/* ============================================
   Tooltips
   ============================================ */

.tooltip-container {
  position: relative;
}

.tooltip {
  position: absolute;
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm);
  color: var(--text-primary);
  box-shadow: var(--shadow-elevated);
  z-index: 100;
  pointer-events: none;
  white-space: nowrap;
}

/* ============================================
   Progress Bar
   ============================================ */

.progress-bar {
  width: 100%;
  height: 8px;
  background: rgba(0, 0, 0, 0.32);
  border: 1px solid rgba(255,255,255,0.055);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffbd59, var(--btc-orange), var(--btc-orange-dark));
  border-radius: 4px;
  box-shadow: 0 0 18px rgba(247, 147, 26, 0.26);
  transition: width 1s var(--ease-out);
}

/* ============================================
   Badge / Tag
   ============================================ */

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px var(--space-2);
  border-radius: 999px;
  font-size: var(--text-xs);
  font-weight: 600;
  border: 1px solid transparent;
}

.badge-success {
  background: var(--success-bg);
  color: var(--success);
  border-color: rgba(0, 212, 170, 0.24);
}

.badge-error {
  background: var(--error-bg);
  color: var(--error);
  border-color: rgba(255, 71, 87, 0.24);
}

.badge-orange {
  background: var(--btc-orange-glow);
  color: var(--btc-orange);
  border-color: rgba(247, 147, 26, 0.24);
}

/* ============================================
   Animations
   ============================================ */

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes countUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes melt {
  0%, 100% { transform: scaleY(1) translateY(0); opacity: 1; }
  50% { transform: scaleY(1.08) translateY(4px); opacity: 0.7; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-fade-in {
  animation: fadeIn var(--duration-slow) var(--ease-out);
}

.animate-slide-up {
  animation: slideUp var(--duration-slow) var(--ease-out);
}

/* Staggered children animation */
.stagger-children > * {
  opacity: 0;
  animation: slideUp var(--duration-slow) var(--ease-out) forwards;
}

.stagger-children > *:nth-child(1) { animation-delay: 0ms; }
.stagger-children > *:nth-child(2) { animation-delay: 60ms; }
.stagger-children > *:nth-child(3) { animation-delay: 120ms; }
.stagger-children > *:nth-child(4) { animation-delay: 180ms; }
.stagger-children > *:nth-child(5) { animation-delay: 240ms; }
.stagger-children > *:nth-child(6) { animation-delay: 300ms; }
.stagger-children > *:nth-child(7) { animation-delay: 360ms; }
.stagger-children > *:nth-child(8) { animation-delay: 420ms; }
.stagger-children > *:nth-child(9) { animation-delay: 480ms; }
.stagger-children > *:nth-child(10) { animation-delay: 540ms; }

/* ============================================
   Page Transitions
   ============================================ */

.page-enter {
  animation: fadeIn 300ms var(--ease-out);
}

/* ============================================
   Hero Section
   ============================================ */

.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(247, 147, 26, 0.08) 0%, transparent 70%);
  pointer-events: none;
  top: -200px;
  right: -100px;
}

.home-page {
  max-width: 1480px;
  margin: 0 auto;
}

.home-hero {
  margin-bottom: 34px;
  border: 1px solid rgba(247, 147, 26, 0.18);
  border-radius: var(--radius-xl);
  background:
    radial-gradient(circle at 50% 0%, rgba(247, 147, 26, 0.22), transparent 32%),
    radial-gradient(circle at 88% 18%, rgba(139, 92, 246, 0.15), transparent 28%),
    linear-gradient(135deg, rgba(21, 15, 10, 0.96), rgba(7, 6, 8, 0.98));
  box-shadow: var(--shadow-card), 0 0 46px rgba(247, 147, 26, 0.08);
}

.home-hero > svg {
  filter: drop-shadow(0 18px 28px rgba(247, 147, 26, 0.22));
}

.home-live-price {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015)),
    rgba(0, 0, 0, 0.28) !important;
  border-color: rgba(247, 147, 26, 0.20) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 18px 44px rgba(0,0,0,0.24);
}

/* ============================================
   Strategy Treasury Page
   ============================================ */

.strategy-page {
  max-width: 1440px;
}

.strategy-hero {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
  gap: clamp(20px, 4vw, 44px);
  overflow: hidden;
  margin-bottom: 24px;
  background:
    radial-gradient(circle at 10% 15%, rgba(247, 147, 26, 0.20), transparent 28%),
    radial-gradient(circle at 85% 10%, rgba(139, 92, 246, 0.16), transparent 30%),
    linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015));
}

.strategy-hero::after {
  content: '';
  position: absolute;
  width: 420px;
  height: 420px;
  right: -160px;
  bottom: -200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(247, 147, 26, 0.18), transparent 68%);
  pointer-events: none;
}

.strategy-hero-copy,
.strategy-hero-panel {
  position: relative;
  z-index: 1;
}

.strategy-logo-row {
  display: flex;
  align-items: flex-start;
  gap: 18px;
}

.strategy-btc-mark {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  background: linear-gradient(135deg, var(--btc-orange), #ffb347);
  color: #0a0a0f;
  font-size: 34px;
  font-weight: 900;
  font-family: Georgia, serif;
  box-shadow: 0 18px 45px rgba(247, 147, 26, 0.22);
}

.strategy-live-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 22px;
}

.strategy-hero-panel {
  align-self: stretch;
  min-height: 260px;
  padding: 24px;
  border-radius: var(--radius-xl);
  border: 1px solid rgba(247, 147, 26, 0.16);
  background:
    linear-gradient(180deg, rgba(10, 10, 15, 0.72), rgba(10, 10, 15, 0.42)),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 18px);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
}

.strategy-panel-label,
.strategy-panel-unit {
  font-size: var(--text-xs);
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.strategy-panel-value {
  margin-top: 14px;
  font-size: clamp(2.8rem, 9vw, 5.75rem);
  line-height: 0.88;
  font-weight: 900;
  letter-spacing: -0.08em;
  color: var(--btc-orange);
  text-shadow: 0 0 28px rgba(247, 147, 26, 0.18);
}

.strategy-mini-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 26px;
}

.strategy-mini-grid > div {
  padding: 12px;
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.035);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.strategy-mini-grid span {
  display: block;
  color: var(--text-faint);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.strategy-mini-grid strong {
  display: block;
  margin-top: 4px;
  color: var(--text-primary);
  font-size: var(--text-sm);
  font-variant-numeric: tabular-nums;
}

.strategy-kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.strategy-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.strategy-chart-grid,
.strategy-secondary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
}

.strategy-secondary-grid {
  margin-top: 20px;
}

.strategy-table th,
.strategy-table td {
  white-space: nowrap;
}

/* ============================================
   Footer
   ============================================ */

.footer {
  margin-top: auto;
  padding: var(--space-8) var(--space-8);
  border-top: 1px solid rgba(247, 147, 26, 0.12);
  background:
    radial-gradient(circle at 8% 0%, rgba(247, 147, 26, 0.10), transparent 34%),
    linear-gradient(180deg, rgba(13, 9, 7, 0.96), rgba(6, 5, 6, 0.98));
}

.footer a {
  color: var(--text-faint);
  text-decoration: none;
  transition: color var(--duration-fast) var(--ease-out);
}

.footer a:hover {
  color: var(--btc-orange);
}

/* ============================================
   Responsive
   ============================================ */

@media (max-width: 1024px) {
  .dashboard-layout {
    grid-template-columns: 1fr;
  }

  .sidebar {
    display: none;
  }

  .sidebar.mobile-open {
    display: flex;
    position: fixed;
    top: var(--navbar-height);
    left: 0;
    bottom: 0;
    width: var(--sidebar-width);
    z-index: 40;
    background:
      radial-gradient(circle at 0% 8%, rgba(247, 147, 26, 0.12), transparent 32%),
      linear-gradient(180deg, rgba(14, 10, 8, 0.98), rgba(8, 6, 8, 0.99));
    border-right: 1px solid rgba(247, 147, 26, 0.16);
    box-shadow: 24px 0 70px rgba(0, 0, 0, 0.45);
  }

  .main-content {
    grid-column: 1;
    padding: var(--space-5);
    overflow-x: hidden;
  }

  #mobile-menu-btn {
    display: flex !important;
  }

  .desktop-nav-links {
    display: none !important;
  }

  .price-ticker .price {
    font-size: var(--text-xs);
  }

  .strategy-hero,
  .strategy-chart-grid,
  .strategy-secondary-grid {
    grid-template-columns: 1fr;
  }

  .strategy-hero-panel {
    min-height: auto;
  }
}

@media (max-width: 640px) {
  .main-content {
    padding: var(--space-4) var(--space-3);
    overflow-x: hidden;
  }

  .kpi-value {
    font-size: var(--text-lg);
  }

  .kpi-card {
    padding: var(--space-3);
  }

  .card {
    padding: var(--space-4);
  }

  .data-table {
    font-size: var(--text-xs);
  }

  .data-table thead th,
  .data-table tbody td {
    padding: var(--space-2) var(--space-2);
  }

  .navbar {
    padding: 0 var(--space-3);
    gap: var(--space-2);
  }

  .page-header-shell {
    grid-template-columns: 1fr;
    padding: 18px;
  }

  .page-header-title {
    font-size: clamp(2rem, 13vw, 3rem);
  }

  .page-header-chip {
    min-width: 0;
  }

  .footer {
    padding: var(--space-4);
  }

  .footer > div {
    flex-direction: column;
    text-align: center;
  }

  /* Charts grid single column on mobile */
  .charts-grid {
    grid-template-columns: 1fr !important;
  }

  .hero-glow {
    width: 300px;
    height: 300px;
  }

  /* Override canvas containers */
  .chart-container {
    min-width: 0;
    overflow: hidden;
  }

  /* Force responsive grids on small screens */
  .responsive-grid {
    grid-template-columns: 1fr !important;
  }

  .strategy-logo-row {
    flex-direction: column;
  }

  .strategy-btc-mark {
    width: 54px;
    height: 54px;
    border-radius: 15px;
    font-size: 29px;
  }

  .strategy-mini-grid {
    grid-template-columns: 1fr;
  }

  .strategy-toolbar {
    align-items: flex-start;
  }

  .strategy-toolbar > div:last-child {
    width: 100%;
    text-align: left !important;
  }
}

/* ============================================
   Chart Containers
   ============================================ */

.chart-container {
  position: relative;
  width: 100%;
  min-width: 0;
  padding: 4px;
  border-radius: var(--radius-md);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.018), rgba(0, 0, 0, 0.08)),
    rgba(0, 0, 0, 0.10);
}

.chart-container canvas {
  max-width: 100%;
}

/* ============================================
   Utility Classes
   ============================================ */

.text-orange { color: var(--btc-orange); }
.text-muted { color: var(--text-muted); }
.text-faint { color: var(--text-faint); }
.text-success { color: var(--success); }
.text-error { color: var(--error); }
.bg-card { background: var(--bg-card); }
.bg-secondary { background: var(--bg-secondary); }

/* Mobile overlay */
.mobile-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 35;
  display: none;
}

.mobile-overlay.active {
  display: block;
}

/* Whale indicator */
.whale-indicator {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 2px var(--space-2);
  background: rgba(247, 147, 26, 0.1);
  border: 1px solid rgba(247, 147, 26, 0.2);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  color: var(--btc-orange);
  font-weight: 600;
}

/* Mempool block viz */
.mempool-block {
  border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
  overflow: hidden;
}

.mempool-tx {
  transition: opacity var(--duration-fast) var(--ease-out);
}

.mempool-tx:hover {
  opacity: 0.8;
}

/* ============================================
   Charts Page - BitBo-style Grid
   ============================================ */

.charts-page {
  max-width: 100%;
}

.charts-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: var(--space-5);
  align-items: end;
  margin-bottom: 24px;
  padding: 24px;
  border: 1px solid rgba(247, 147, 26, 0.18);
  border-radius: var(--radius-xl);
  background:
    radial-gradient(circle at 14% 12%, rgba(247, 147, 26, 0.22), transparent 34%),
    radial-gradient(circle at 94% 0%, rgba(139, 92, 246, 0.18), transparent 32%),
    linear-gradient(135deg, rgba(22, 22, 42, 0.96), rgba(9, 7, 6, 0.98));
  box-shadow: var(--shadow-card), 0 0 46px rgba(247, 147, 26, 0.08);
}

.charts-eyebrow {
  color: var(--btc-orange);
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.charts-hero h1 {
  font-size: clamp(2rem, 5vw, 4.5rem);
  line-height: 0.95;
  font-weight: 800;
  letter-spacing: -0.06em;
  color: var(--text-primary);
  margin: 0 0 10px;
}

.charts-hero p {
  max-width: 760px;
  color: var(--text-muted);
  line-height: 1.65;
  font-size: var(--text-sm);
}

.charts-live-card {
  min-width: 220px;
  display: grid;
  gap: 8px;
  justify-items: start;
  padding: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  background: rgba(0, 0, 0, 0.24);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

.charts-live-card strong {
  color: var(--text-primary);
  font-size: var(--text-xl);
}

.charts-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.charts-panel {
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(247, 147, 26, 0.12);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.035), transparent 42%),
    radial-gradient(circle at 100% 0%, rgba(247, 147, 26, 0.12), transparent 32%),
    var(--bg-primary);
  box-shadow: var(--shadow-card);
}

.charts-panel-full {
  grid-column: 1 / -1;
}

.charts-panel-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 16px 18px 10px;
  border-bottom: 1px solid rgba(247, 147, 26, 0.08);
  gap: 12px;
}

.charts-panel-heading {
  min-width: 0;
}

.charts-panel-title {
  font-size: var(--text-sm);
  font-weight: 800;
  color: var(--btc-orange);
  text-transform: uppercase;
  letter-spacing: 0.075em;
}

.charts-panel-subtitle {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 4px;
  line-height: 1.4;
}

.charts-panel-body {
  padding: 14px 18px 18px;
  flex: 1;
}

.charts-panel-range {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}

.charts-panel-range > span {
  color: var(--text-faint);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  flex: 0 0 auto;
}

.charts-panel-range .chart-range-controls {
  background: rgba(0, 0, 0, 0.24);
  border: 1px solid rgba(255,255,255,0.06);
}

.charts-badge {
  display: inline-block;
  padding: 4px 10px;
  border: 1px solid rgba(247, 147, 26, 0.4);
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  white-space: nowrap;
  letter-spacing: 0.03em;
  line-height: 1.35;
  flex-shrink: 0;
}

.indicator-hero {
  display: grid;
  justify-items: center;
  text-align: center;
  gap: 4px;
  padding: 10px 8px 14px;
}

.indicator-value {
  max-width: 100%;
  overflow-wrap: anywhere;
  font-size: clamp(1.75rem, 5vw, 3rem);
  line-height: 1;
  font-weight: 900;
  letter-spacing: -0.055em;
}

.indicator-label {
  font-size: var(--text-sm);
  font-weight: 800;
}

.indicator-subvalue {
  max-width: 420px;
  color: var(--text-faint);
  font-size: var(--text-xs);
  line-height: 1.45;
}

.fear-greed-gauge {
  display: grid;
  justify-items: center;
  text-align: center;
  margin-top: -6px;
}

.charts-stat-grid {
  display: grid;
  gap: 5px;
  margin-top: 14px;
}

.charts-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 7px 0;
  font-size: var(--text-xs);
  color: var(--text-muted);
  border-bottom: 1px dotted rgba(247, 147, 26, 0.12);
}

.charts-stat-row:last-child {
  border-bottom: none;
}

.charts-stat-row span:first-child {
  min-width: 0;
}

.charts-stat-row span:last-child {
  text-align: right;
  font-family: 'Inter', monospace;
  font-variant-numeric: tabular-nums;
}

.chart-split-header {
  display: grid;
  grid-template-columns: minmax(220px, 0.78fr) minmax(240px, 1fr);
  align-items: center;
  gap: 18px;
  margin-bottom: 10px;
}

.charts-source-note {
  margin-top: 24px;
  padding: 14px 16px;
  background: rgba(247, 147, 26, 0.06);
  border: 1px solid rgba(247, 147, 26, 0.16);
  border-radius: var(--radius-md);
  font-size: var(--text-xs);
  color: var(--text-faint);
  line-height: 1.65;
}

.valuation-page .valuation-hero {
  margin-bottom: 16px;
}

.valuation-score-card {
  display: grid;
  grid-template-columns: minmax(0, 0.82fr) minmax(360px, 1.18fr);
  gap: 18px;
  align-items: stretch;
  margin-bottom: 18px;
  padding: 22px;
  border: 1px solid rgba(247, 147, 26, 0.18);
  border-radius: var(--radius-xl);
  background:
    radial-gradient(circle at 10% 0%, rgba(247, 147, 26, 0.2), transparent 34%),
    radial-gradient(circle at 92% 24%, rgba(139, 92, 246, 0.16), transparent 34%),
    linear-gradient(135deg, rgba(18, 14, 10, 0.96), rgba(8, 8, 16, 0.98));
  box-shadow: var(--shadow-card), 0 0 46px rgba(247, 147, 26, 0.08);
}

.valuation-score-main {
  min-width: 0;
  display: grid;
  align-content: center;
  gap: 8px;
}

.valuation-score {
  font-size: clamp(4rem, 13vw, 8.5rem);
  line-height: 0.84;
  font-weight: 950;
  letter-spacing: -0.09em;
}

.valuation-score-label {
  font-size: clamp(1.2rem, 4vw, 2.2rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: -0.045em;
}

.valuation-score-main p {
  max-width: 620px;
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.65;
}

.valuation-score-side {
  min-width: 0;
  display: grid;
  align-content: center;
  gap: 16px;
}

.valuation-meter {
  display: grid;
  gap: 8px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-lg);

.valuation-meter-scale {

.valuation-meter-track {

.valuation-meter-fill {

.valuation-meter-pin {

.valuation-summary-grid {

.valuation-mini-card {

.valuation-mini-card span {

.valuation-mini-card strong {

.valuation-mini-card em {

.valuation-page .chart-range-controls {

.valuation-page .chart-range-controls .tab-btn {

@media (max-width: 1180px) {

@media (max-width: 760px) {

  .chart-split-header {

  .valuation-score-card {

/* ============================================
   Price Tracker & ETF Flows
   ============================================ */

.price-tracker-page,
.etf-flows-page,
.dominance-page {
  max-width: 100%;
}

.price-tracker-hero,
.etf-hero-card,
.dominance-hero-card {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
  gap: 18px;
  margin-bottom: 18px;
  padding: clamp(18px, 3vw, 26px);

  border-radius: 28px;
  background:
    radial-gradient(circle at 10% 0%, rgba(247, 147, 26, 0.20), transparent 34%),
    radial-gradient(circle at 92% 18%, rgba(139, 92, 246, 0.15), transparent 34%),
    linear-gradient(135deg, rgba(17, 11, 7, 0.96), rgba(7, 6, 9, 0.98));

  overflow: hidden;
}

.price-main-panel,
.etf-hero-main,
.dominance-hero-main {

  display: grid;
  align-content: center;
  gap: 10px;
}

.price-main-panel h2,
.etf-hero-main h2,
.dominance-hero-main h2 {
  margin: 0;
  font-size: clamp(3rem, 10vw, 7rem);
  line-height: 0.86;
  font-weight: 950;
  letter-spacing: -0.09em;
}

.etf-hero-main h2,
.dominance-hero-main h2 {
  font-size: clamp(2.8rem, 8vw, 6rem);
}

.price-main-panel p,
.etf-hero-main p,
.dominance-hero-main p {
  max-width: 680px;
  margin: 0;
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.7;
}

.price-live-row,
.etf-hero-pills,
.dominance-hero-pills {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  color: var(--text-muted);
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.live-dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: var(--warning);

}

.live-dot.live {

}

.positive {

}

.negative {

}

.price-range-panel,
.etf-range-card {
  min-width: 0;
  display: grid;
  gap: 14px;
  align-content: center;
  padding: 16px;
  border: 1px solid rgba(255, 183, 77, 0.12);
  border-radius: 22px;
  background: rgba(0, 0, 0, 0.24);
}

.price-tracker-page .chart-range-controls,
.etf-flows-page .chart-range-controls,
.dominance-page .chart-range-controls {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  overflow-x: visible;
  background: rgba(0, 0, 0, 0.22);
  border: 1px solid rgba(255,255,255,0.06);
}

.price-tracker-page .chart-range-controls .tab-btn,
.etf-flows-page .chart-range-controls .tab-btn,
.dominance-page .chart-range-controls .tab-btn {
  flex: 1 1 calc(11.111% - 3px);
  min-width: 0;
  padding-left: 6px;
  padding-right: 6px;
  text-align: center;
}

.etf-flows-page .chart-range-controls .tab-btn {
  flex-basis: calc(14.285% - 3px);
}

.price-inspector-card,
.etf-range-net {
  display: grid;
  gap: 4px;
  padding: 16px;
  border: 1px solid rgba(247,147,26,0.14);
  border-radius: 18px;
  background:
    radial-gradient(circle at 90% 0%, rgba(247,147,26,0.13), transparent 36%),
    rgba(255,255,255,0.035);
}

.price-inspector-card span,
.etf-range-net span {
  color: var(--text-faint);
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.11em;
  text-transform: uppercase;
}

.price-inspector-card strong,
.etf-range-net strong {
  color: var(--text-primary);
  font-size: clamp(1.6rem, 4vw, 2.5rem);
  line-height: 1;
  font-weight: 900;
  letter-spacing: -0.06em;
}

.price-inspector-card em,
.etf-range-net em {
  color: var(--text-muted);
  font-size: var(--text-xs);
  font-style: normal;
}

.price-chart-card {
  margin-bottom: 16px;
  padding: clamp(16px, 3vw, 22px);
  border: 1px solid rgba(247,147,26,0.16);
  border-radius: 28px;
  background:
    radial-gradient(circle at 12% 0%, rgba(247,147,26,0.13), transparent 34%),
    radial-gradient(circle at 92% 12%, rgba(139,92,246,0.10), transparent 34%),
    rgba(6, 5, 5, 0.82);
  box-shadow: var(--shadow-card);
}

.price-chart-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 12px;
}

.price-chart-header h2 {
  margin: 0 0 4px;
  font-size: clamp(1.4rem, 3vw, 2rem);
  line-height: 1.05;
  letter-spacing: -0.05em;
}

.price-chart-header p {
  margin: 0;
  color: var(--text-muted);
  font-size: var(--text-sm);
}

.price-chart-stage {
  min-width: 0;
  overflow: hidden;
  border-radius: 24px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.025), rgba(0,0,0,0.08)),
    rgba(0, 0, 0, 0.22);
}

.price-chart-svg {
  display: block;
  width: 100%;
  height: clamp(280px, 48vw, 420px);
  cursor: crosshair;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

.price-chart-empty {
  min-height: 320px;
  display: grid;
  place-items: center;
  color: var(--text-faint);
  border: 1px dashed rgba(247,147,26,0.16);
  border-radius: 24px;
  background: rgba(0,0,0,0.18);
}

.price-stat-grid,
.etf-metric-grid,
.dominance-metric-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}

.price-stat-card,
.etf-metric-card,
.dominance-metric-card {
  min-width: 0;
  display: grid;
  gap: 6px;
  padding: 15px;
  border: 1px solid rgba(255,183,77,0.12);
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.24);
}

.price-stat-card.positive,
.etf-metric-card.positive,
.dominance-metric-card.positive {
  border-color: rgba(0, 212, 170, 0.22);
  background: rgba(0, 212, 170, 0.055);
}

.price-stat-card.negative,
.etf-metric-card.negative,
.dominance-metric-card.negative {
  border-color: rgba(255, 71, 87, 0.20);
  background: rgba(255, 71, 87, 0.045);
}

.price-stat-card span,
.etf-metric-card span,
.dominance-metric-card span {
  color: var(--text-faint);
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

.price-stat-card strong,
.etf-metric-card strong,
.dominance-metric-card strong {
  min-width: 0;
  overflow-wrap: anywhere;
  color: var(--text-primary);
  font-size: var(--text-lg);
  line-height: 1.08;
  font-weight: 900;
  letter-spacing: -0.05em;
}

.price-stat-card em,
.etf-metric-card em,
.dominance-metric-card em {
  color: var(--text-muted);
  font-size: var(--text-xs);
  font-style: normal;
  line-height: 1.35;
}

.etf-chart-panel {
  margin-bottom: 18px;
}

.etf-detail-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 0.9fr);
  gap: 18px;
}

.etf-table-wrap {
  max-height: 420px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.etf-flow-table td:first-child {
  color: var(--text-primary);
  font-weight: 900;
}

.etf-explainer {
  display: grid;
  gap: 14px;
}

.etf-explainer p {
  margin: 0;
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.7;
}

.etf-explainer a {
  color: var(--btc-orange);
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: 0.08em;
  text-decoration: none;
  text-transform: uppercase;
}

.dominance-hero-card.strong {
  border-color: rgba(247,147,26,0.28);
}

.dominance-hero-card.balanced {
  border-color: rgba(255,183,77,0.18);
}

.dominance-hero-card.alt-season {
  border-color: rgba(139,92,246,0.28);
}

.dominance-meter-card {
  min-width: 0;
  display: grid;
  place-items: center;
  gap: 16px;
  padding: 18px;
  border: 1px solid rgba(255, 183, 77, 0.12);
  border-radius: 24px;
  background:
    radial-gradient(circle at 50% 16%, rgba(247,147,26,0.13), transparent 42%),
    rgba(0, 0, 0, 0.26);
}

.dominance-ring {
  --dominance-angle: 0deg;
  width: min(270px, 68vw);
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background:
    conic-gradient(from -90deg, #f7931a 0deg var(--dominance-angle), rgba(139,92,246,0.58) var(--dominance-angle) 360deg);
  box-shadow:
    inset 0 0 34px rgba(0,0,0,0.55),
    0 0 48px rgba(247,147,26,0.13);
}

.dominance-ring::before {
  content: "";
  position: absolute;
}

.dominance-ring-core {
  width: 70%;
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 5px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  background:
    radial-gradient(circle at 50% 0%, rgba(247,147,26,0.16), transparent 42%),
    #080604;
}

.dominance-ring-core span {
  color: var(--text-faint);
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.dominance-ring-core strong {
  color: #fff3df;
  font-size: clamp(2rem, 6vw, 3rem);
  line-height: 1;
  font-weight: 950;
  letter-spacing: -0.08em;
}

.dominance-meter-legend {
  width: 100%;
  display: grid;
  gap: 8px;
}

.dominance-meter-legend div {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 9px;
  color: var(--text-muted);
  font-size: var(--text-xs);
}

.dominance-meter-legend strong {
  color: var(--text-primary);
  font-weight: 800;
}

.dominance-meter-legend em {
  color: var(--text-muted);
  font-style: normal;
}

.dominance-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
}

.dominance-dot.btc {
  background: #f7931a;
  box-shadow: 0 0 10px rgba(247,147,26,0.45);
}

.dominance-dot.alts {
  background: #8b5cf6;
  box-shadow: 0 0 10px rgba(139,92,246,0.45);
}

.dominance-chart-panel {
  margin-bottom: 18px;
}

.dominance-trend-empty {
  min-height: 300px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 10px;
  text-align: center;
  padding: 24px;
  border: 1px dashed rgba(247,147,26,0.20);
  border-radius: 22px;
  background:
    radial-gradient(circle at 50% 0%, rgba(247,147,26,0.12), transparent 36%),
    rgba(0,0,0,0.18);
}

.dominance-trend-empty strong {
  color: var(--btc-orange);
  font-size: clamp(2rem, 8vw, 4rem);
  line-height: 1;
  letter-spacing: -0.08em;
}

.dominance-trend-empty span {
  max-width: 520px;
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.55;
}

.dominance-detail-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
  gap: 18px;
}

.dominance-split-body {
  display: grid;
  gap: 12px;
}

.dominance-split-body p {
  margin: 0;
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.65;
}

@media (max-width: 1180px) {
  .price-stat-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .etf-metric-grid,
  .dominance-metric-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 860px) {
  .price-tracker-hero,
  .etf-hero-card,
  .dominance-hero-card,
  .etf-detail-grid,
  .dominance-detail-grid {

@media (max-width: 640px) {
  .price-tracker-hero,
  .etf-hero-card,
  .dominance-hero-card {
    border-radius: 22px;

  }

  .price-main-panel h2,
  .etf-hero-main h2,
  .dominance-hero-main h2 {
    font-size: clamp(2.5rem, 16vw, 4rem);
  }

  .price-range-panel,
  .etf-range-card {
    padding: 12px;
  }

  .price-tracker-page .chart-range-controls .tab-btn {
    flex-basis: calc(20% - 3px);
  }

  .etf-flows-page .chart-range-controls .tab-btn {
    flex-basis: calc(25% - 3px);
  }

  .price-stat-grid,
  .etf-metric-grid,
  .dominance-metric-grid {

  }

  .price-chart-card {

  }

  .price-chart-svg {
    height: 330px;
  }

/* ============================================
   Market Pulse: Sentiment, News, Mining
   ============================================ */

.market-pulse-page {
  --pulse-panel: rgba(12, 8, 6, 0.82);
  --pulse-line: rgba(255, 183, 77, 0.13);
}

.pulse-status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: -18px 0 22px;
  color: var(--text-faint);
  font-size: var(--text-xs);
}

.pulse-section {
  position: relative;
  margin-bottom: 28px;
  padding: clamp(18px, 3vw, 26px);
  border: 1px solid var(--pulse-line);
  border-radius: 28px;
  background:
    radial-gradient(circle at 8% 0%, rgba(247, 147, 26, 0.13), transparent 28%),
    radial-gradient(circle at 90% 8%, rgba(139, 92, 246, 0.10), transparent 30%),
    linear-gradient(145deg, rgba(16, 10, 7, 0.92), rgba(8, 6, 8, 0.88));
  box-shadow: 0 22px 70px rgba(0, 0, 0, 0.30);
  overflow: hidden;
}

.pulse-section::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, transparent, rgba(255,255,255,0.035), transparent),
    repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 18px);
  opacity: 0.45;
}

.pulse-section > * {
  position: relative;
  z-index: 1;
}

.pulse-section-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.pulse-section-header h2 {
  margin: 2px 0 0;
  font-size: clamp(1.25rem, 3vw, 1.9rem);
  line-height: 1.08;
  letter-spacing: -0.04em;
}

.pulse-section-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--btc-orange);
  text-decoration: none;
  font-size: var(--text-xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.pulse-two-column {
  display: grid;
  grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.28fr);
  gap: 18px;
  align-items: stretch;
}

.pulse-gauge-card {
  display: grid;
  grid-template-columns: 190px 1fr;
  align-items: center;
  gap: 18px;
  min-height: 100%;
  padding: clamp(18px, 3vw, 24px);
  border: 1px solid rgba(255, 183, 77, 0.14);
  border-radius: 24px;
  background:
    radial-gradient(circle at 25% 22%, rgba(247, 147, 26, 0.16), transparent 38%),
    rgba(0, 0, 0, 0.24);
}

.pulse-gauge-ring {
  --gauge: 0;
  --gauge-color: var(--btc-orange);
  width: 180px;
  height: 180px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background:
    conic-gradient(var(--gauge-color) calc(var(--gauge) * 1%), rgba(255,255,255,0.055) 0),
    radial-gradient(circle, rgba(247,147,26,0.16), transparent 72%);
  box-shadow: 0 0 55px rgba(247, 147, 26, 0.12);
}

.pulse-gauge-inner {
  width: 132px;
  height: 132px;
  display: grid;
  place-items: center;
  align-content: center;
  border-radius: 50%;
  background: #090605;
  border: 1px solid rgba(255, 183, 77, 0.14);
}

.pulse-gauge-value {
  font-size: 3rem;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.08em;
}

.pulse-gauge-label {
  margin-top: 6px;
  color: var(--text-muted);
  font-size: var(--text-xs);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.pulse-gauge-copy h2 {
  margin: 8px 0 10px;
  font-size: clamp(1.45rem, 3vw, 2.2rem);
  line-height: 1.05;
  letter-spacing: -0.05em;
}

.pulse-gauge-copy p {
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.7;
}

.pulse-meta-line {
  margin-top: 14px;
  color: var(--text-faint);
  font-size: var(--text-xs);

  const sampled = [];
  for (let i = 0; i < series.length; i += step) sampled.push(series[i]);
  const last = series[series.length - 1];
  if (sampled[sampled.length - 1] !== last) sampled.push(last);

function decodeHtmlText(value) {
  const text = String(value || '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  if (typeof document !== 'undefined') {
    const el = document.createElement('textarea');
    el.innerHTML = text;
    return el.value;
  }
  return text
    .replace(/&amp;/g, '&')
    .replace(/&quot;/g, '"')
    .replace(/&#x27;/g, "'")
    .replace(/&apos;/g, "'")
    .replace(/&nbsp;/g, ' ')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>');
}

function normalizeFearGreedRow(row) {
  if (!row) return null;
  const value = parseInt(row.value, 10);
  const timestamp = parseInt(row.timestamp, 10);
  if (!Number.isFinite(value) || !Number.isFinite(timestamp)) return null;
  return {
    value,
    label: row.value_classification || 'Unknown',
    timestamp: timestamp * 1000,
    date: new Date(timestamp * 1000).toISOString(),
    timeUntilUpdate: row.time_until_update ? parseInt(row.time_until_update, 10) : null,
  };
}

function splitNewsTitle(rawTitle) {
  const title = decodeHtmlText(rawTitle);
  const separator = title.lastIndexOf(' - ');
  if (separator > 12 && separator < title.length - 3) {
    return {
      title: title.slice(0, separator).trim(),
      source: title.slice(separator + 3).trim(),
    };
  }
  return { title, source: 'Bitcoin news' };
}

function isBitcoinNewsTitle(title) {
  const lower = String(title || '').toLowerCase();
  if (!lower.includes('bitcoin') && !/\bbtc\b/.test(lower)) return false;
  if (lower.includes('bitcoin cash') || /\bbch\b/.test(lower)) return false;
  return true;
}

function normalizeRssNewsItem(item, index) {
  const split = splitNewsTitle(item && item.title);
  if (!split.title || !isBitcoinNewsTitle(split.title)) return null;
  return {
    id: item.guid || item.link || 'rss-' + index,
    title: split.title,
    source: split.source || 'Google News',
    url: item.link || '#',
    publishedAt: item.pubDate ? new Date(item.pubDate).toISOString() : null,
    description: decodeHtmlText(item.description || item.content || ''),
    image: item.thumbnail || (item.enclosure && item.enclosure.link) || null,
  };
}

function normalizeHackerNewsItem(item, index) {
  const title = decodeHtmlText(item && item.title);
  if (!title || !isBitcoinNewsTitle(title)) return null;
  return {
    id: item.objectID || 'hn-' + index,
    title,
    source: 'Hacker News',
    url: item.url || ('https://news.ycombinator.com/item?id=' + item.objectID),
    publishedAt: item.created_at || null,
    description: (item.points || 0) + ' points · ' + (item.num_comments || 0) + ' comments',
    image: null,
  };
}

   Bitcoin ETF flows
   Free public Farside Investors tables read through Jina Reader.
   Values are US$ millions and update on trading days after issuers report.
   ------------------------------------------ */
const ETF_FLOWS_ALL_DATA_URL = 'https://r.jina.ai/http://r.jina.ai/http://farside.co.uk/bitcoin-etf-flow-all-data/';
const ETF_FLOWS_RECENT_URL = 'https://r.jina.ai/http://r.jina.ai/http://farside.co.uk/btc/';

function parseEtfMarkdownCells(line) {
  return String(line || '')
    .trim()
    .replace(/^\|/, '')
    .replace(/\|$/, '')
    .split('|')
    .map(cell => cell.trim().replace(/\*\*/g, ''));
}

function parseEtfFlowValue(value) {
  const raw = String(value || '').trim();
  if (!raw || raw === '-' || raw === '—') return 0;
  const isNegative = raw.startsWith('(') && raw.endsWith(')');
  const cleaned = raw
    .replace(/\[[^\]]+\]\([^)]+\)/g, '')
    .replace(/[,$]/g, '')
    .replace(/[()]/g, '')
    .trim();
  const parsed = parseFloat(cleaned);
  if (!Number.isFinite(parsed)) return 0;
  return isNegative ? -parsed : parsed;
}

function parseEtfDateLabel(label) {
  const months = {
    Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5,
    Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11,
  };
  const match = String(label || '').match(/^(\d{1,2})\s+([A-Z][a-z]{2})\s+(\d{4})$/);
  if (!match || months[match[2]] === undefined) return null;
  return Date.UTC(parseInt(match[3], 10), months[match[2]], parseInt(match[1], 10));
}

function formatEtfDateLabel(timestamp) {
  return new Date(timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function sumEtfRows(rows) {
  return rows.reduce((sum, row) => sum + (Number(row.total) || 0), 0);
}

function parseFarsidePipeEtfFlows(markdown) {
  const lines = markdown.split('\n').map(line => line.trim()).filter(line => line.startsWith('|') && !line.includes('---'));
  let tickers = [];
  let totalByFund = null;
  const rows = [];

  for (const line of lines) {
    const cells = parseEtfMarkdownCells(line);
    if (cells.length < 3) continue;

    if (cells.includes('IBIT')) {
      const dateIndex = cells[0] === 'Date' || cells[0] === '' ? 0 : -1;
      let endIndex = cells.findIndex(cell => cell === 'Total');
      if (endIndex < 0) endIndex = cells.length;
      if (cells[endIndex - 1] === '') endIndex -= 1;
      tickers = cells
        .slice(dateIndex + 1, endIndex)
        .filter(cell => /^[A-Z0-9]+$/.test(cell));
      continue;
    }

    if (!tickers.length) continue;

    const first = cells[0];
    if (first === 'Total') {
      totalByFund = {};
      tickers.forEach((ticker, index) => {
        totalByFund[ticker] = parseEtfFlowValue(cells[index + 1]);
      });
      totalByFund.Total = parseEtfFlowValue(cells[tickers.length + 1]);
      continue;
    }

    const timestamp = parseEtfDateLabel(first);
    if (!timestamp) continue;

    const funds = {};
    tickers.forEach((ticker, index) => {
      funds[ticker] = parseEtfFlowValue(cells[index + 1]);
    });
    rows.push({
      dateLabel: first,
      displayDate: formatEtfDateLabel(timestamp),
      timestamp,
      funds,
      total: parseEtfFlowValue(cells[tickers.length + 1]),
    });
  }

  const sortedRows = rows
    .filter(row => Number.isFinite(row.timestamp))
    .sort((a, b) => a.timestamp - b.timestamp);

  if (!sortedRows.length) return null;

  return {
    tickers,
    rows: sortedRows,
    totalByFund,
  };
}

function parseFarsidePlainEtfFlows(text) {
  const lines = String(text || '').split('\n').map(line => line.trim()).filter(Boolean);
  const dateHeader = lines.findIndex((line, index) => (
    line === 'Date' && lines.slice(index + 1, index + 18).includes('IBIT') && lines.slice(index + 1, index + 18).includes('Total')
  ));
  if (dateHeader < 0) return null;

  const tickers = [];
  let cursor = dateHeader + 1;
  while (cursor < lines.length && lines[cursor] !== 'Total') {
    if (/^[A-Z0-9]+$/.test(lines[cursor])) tickers.push(lines[cursor]);
    cursor += 1;
  }
  if (!tickers.length || lines[cursor] !== 'Total') return null;

  const rows = [];
  let totalByFund = null;
  for (let i = cursor + 1; i < lines.length; i += 1) {
    const line = lines[i];
    const timestamp = parseEtfDateLabel(line);
    if (timestamp) {
      const values = [];
      let j = i + 1;
      while (j < lines.length && values.length < tickers.length + 1) {
        values.push(lines[j]);
        j += 1;
      }
      if (values.length >= tickers.length + 1) {
        const funds = {};
        tickers.forEach((ticker, index) => {
          funds[ticker] = parseEtfFlowValue(values[index]);
        });
        rows.push({
          dateLabel: line,
          displayDate: formatEtfDateLabel(timestamp),
          timestamp,
          funds,
          total: parseEtfFlowValue(values[tickers.length]),
        });
        i = j - 1;
      }
      continue;
    }

    if (line === 'Total' && rows.length) {
      totalByFund = {};
      for (let k = 0; k < tickers.length; k += 1) {
        totalByFund[tickers[k]] = parseEtfFlowValue(lines[i + 1 + k]);
      }
      totalByFund.Total = parseEtfFlowValue(lines[i + 1 + tickers.length]);
      break;
    }
  }

  const sortedRows = rows
    .filter(row => Number.isFinite(row.timestamp))
    .sort((a, b) => a.timestamp - b.timestamp);

  if (!sortedRows.length) return null;

  return {
    tickers,
    rows: sortedRows,
    totalByFund,
  };
}

function parseFarsideEtfFlows(markdown) {
  if (typeof markdown !== 'string' || !markdown.includes('IBIT') || !markdown.includes('Total')) return null;
  return parseFarsidePipeEtfFlows(markdown) || parseFarsidePlainEtfFlows(markdown);
}

function buildEtfFlowSnapshot(parsed, sourceUrl, fetchedAt) {
  const rows = parsed.rows;
  const latest = rows[rows.length - 1];
  const previous = rows.length > 1 ? rows[rows.length - 2] : null;
  const recent7 = rows.slice(-7);
  const recent30 = rows.slice(-30);
  const inflowDays30 = recent30.filter(row => row.total > 0).length;
  const outflowDays30 = recent30.filter(row => row.total < 0).length;
  const latestFunds = Object.entries(latest.funds || {})
    .map(([ticker, value]) => ({ ticker, value }))
    .sort((a, b) => Math.abs(b.value) - Math.abs(a.value));
  const leader = latestFunds[0] || null;
  const cumulativeFromRows = sumEtfRows(rows);
  const cumulative = parsed.totalByFund && Number.isFinite(parsed.totalByFund.Total)
    ? parsed.totalByFund.Total
    : cumulativeFromRows;

  return {
    source: 'Farside Investors via Jina Reader',
    sourceUrl,
    unit: 'US$m',
    fetchedAt,
    tickers: parsed.tickers,
    rows,
    latest,
    previous,
    latestFunds,
    latestLeader: leader,
    net7d: sumEtfRows(recent7),
    net30d: sumEtfRows(recent30),
    cumulativeNet: cumulative,
    inflowDays30,
    outflowDays30,
    totalByFund: parsed.totalByFund,
  };
}

globalThis.fetchBitcoinEtfFlows = async function fetchBitcoinEtfFlows() {
  const cached = cacheGet('bitcoin-etf-flows', 300000);
  if (cached) return cached;

  const fetchedAt = new Date().toISOString();
  const sources = [ETF_FLOWS_ALL_DATA_URL, ETF_FLOWS_RECENT_URL];
  for (const url of sources) {
    const text = await tryFetch(url, 20000, { cache: 'no-store' });
    const parsed = parseFarsideEtfFlows(text);
    if (parsed && parsed.rows.length) {
      const result = buildEtfFlowSnapshot(parsed, url.includes('all-data') ? 'https://farside.co.uk/bitcoin-etf-flow-all-data/' : 'https://farside.co.uk/btc/', fetchedAt);
      cacheSet('bitcoin-etf-flows', result);
      return result;
    }
  }

  return cached || null;
}

function normalizeDominanceSource(source) {
  if (!source || !Number.isFinite(source.dominance) || source.dominance <= 0 || source.dominance >= 100) return null;
  return {
    name: source.name,
    dominance: source.dominance,
    totalMarketCap: Number.isFinite(source.totalMarketCap) ? source.totalMarketCap : null,
    totalVolume: Number.isFinite(source.totalVolume) ? source.totalVolume : null,
    marketCapChange24h: Number.isFinite(source.marketCapChange24h) ? source.marketCapChange24h : null,
    activeCryptocurrencies: Number.isFinite(source.activeCryptocurrencies) ? source.activeCryptocurrencies : null,
    markets: Number.isFinite(source.markets) ? source.markets : null,
    updatedAt: source.updatedAt || null,
    url: source.url,
  };
}

function medianValue(values) {
  const clean = values.map(Number).filter(Number.isFinite).sort((a, b) => a - b);
  if (!clean.length) return null;
  const mid = Math.floor(clean.length / 2);
  return clean.length % 2 ? clean[mid] : (clean[mid - 1] + clean[mid]) / 2;
}

function readDominanceHistory() {
  if (typeof window === 'undefined' || !window.localStorage) return [];
  try {
    const raw = window.localStorage.getItem(DOMINANCE_HISTORY_KEY);
    const rows = raw ? JSON.parse(raw) : [];
    return Array.isArray(rows)
      ? rows
          .map(row => ({
            ts: Number(row.ts),
            dominance: Number(row.dominance),
            totalMarketCap: parseApiNumber(row.totalMarketCap),
            sourceCount: parseApiNumber(row.sourceCount),
          }))
          .filter(row => Number.isFinite(row.ts) && Number.isFinite(row.dominance))
          .sort((a, b) => a.ts - b.ts)
      : [];
  } catch {
    return [];
  }
}

function saveDominanceHistorySample(sample) {
  const latest = {
    ts: sample.updatedAt ? new Date(sample.updatedAt).getTime() : Date.now(),
    dominance: sample.dominance,
    totalMarketCap: sample.totalMarketCap,
    sourceCount: sample.sourceCount,
  };
  if (!Number.isFinite(latest.ts) || !Number.isFinite(latest.dominance)) return [];
  if (typeof window === 'undefined' || !window.localStorage) return [latest];

  const history = readDominanceHistory();
  const last = history[history.length - 1];
  if (!last || Math.abs(last.ts - latest.ts) > 60000 || Math.abs(last.dominance - latest.dominance) > 0.01) {
    history.push(latest);
  } else {
    history[history.length - 1] = latest;
  }

  const fiveYearsAgo = Date.now() - 1825 * 86400000;
  const pruned = history
    .filter(row => row.ts >= fiveYearsAgo)
    .slice(-12000);
  try {
    window.localStorage.setItem(DOMINANCE_HISTORY_KEY, JSON.stringify(pruned));
  } catch {
    // Private browsing or full storage should not break live data.
  }
  return pruned;
}

   ------------------------------------------ */
const { useState, useEffect, createElement: h } = window.React;

globalThis.useLiveData = function useLiveData(fetchFn, intervalMs = 30000, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);

  useEffect(() => {
    let mounted = true;
    const doFetch = async () => {
      try {
        const result = await fetchFn();
        if (mounted) {
          setData(result);
          setLoading(false);
          setLastUpdated(new Date());
          setError(null);
        }
      } catch (e) {
        if (mounted) {
          setError(e.message);
          setLoading(false);
        }
      }
    };
    doFetch();
    const interval = setInterval(doFetch, intervalMs);
    const refreshWhenVisible = () => {
      if (typeof document === 'undefined' || !document.hidden) doFetch();
    };
    if (typeof document !== 'undefined') {
      document.addEventListener('visibilitychange', refreshWhenVisible);
    }
    if (typeof window !== 'undefined') {
      window.addEventListener('focus', doFetch);
    }
    return () => {
      mounted = false;
      clearInterval(interval);
      if (typeof document !== 'undefined') {
        document.removeEventListener('visibilitychange', refreshWhenVisible);
      }
      if (typeof window !== 'undefined') {
        window.removeEventListener('focus', doFetch);
      }
    };
  }, deps);

  return { data, loading, error, lastUpdated };
}

/* ------------------------------------------
   useBTCWebSocket — real-time BTC price via WebSocket
   Uses Coinbase Exchange's public ticker channel as primary,
   falls back to REST polling via fetchBTCPrice.
   Caches last price in memory.
   ------------------------------------------ */
/* In-memory cache for WS price + block height */
const _wsCache = {};

function wsCacheGet(key) {
  const entry = _wsCache[key];
  if (!entry) return null;
  if (Date.now() - entry.ts > 300000) return null;
  return entry.value;
}

function wsCacheSet(key, value) {
  _wsCache[key] = { value, ts: Date.now() };
}

globalThis.useBTCWebSocket = function useBTCWebSocket() {
  const [price, setPrice] = useState(() => wsCacheGet('ws_price') || null);
  const [wsStatus, setWsStatus] = useState('connecting');

  useEffect(() => {
    let ws = null;
    let mounted = true;
    let reconnectTimer = null;
    let restInterval = null;
    let emitTimer = null;
    let pendingPrice = null;
    let lastEmitAt = 0;

    const emitPrice = (value, force = false) => {
      const p = Number(value);
      if (!Number.isFinite(p) || p <= 0) return;
      wsCacheSet('ws_price', p);

      const now = Date.now();
      const elapsed = now - lastEmitAt;
      const commit = () => {
        emitTimer = null;
        if (!mounted || !Number.isFinite(pendingPrice)) return;
        setPrice(pendingPrice);
        lastEmitAt = Date.now();
        pendingPrice = null;
      };

      pendingPrice = p;
      if (force || elapsed >= 1000) {
        if (emitTimer) clearTimeout(emitTimer);
        emitTimer = null;
        setPrice(p);
        lastEmitAt = now;
        pendingPrice = null;
        return;
      }

      if (!emitTimer) {
        emitTimer = setTimeout(commit, Math.max(120, 1000 - elapsed));
      }
    };

    // REST polling fallback (every 20s)
    const pollRest = async () => {
      const result = await fetchBTCPrice();
      if (result && mounted) {
        emitPrice(result.price, true);
      }
    };

    // Start REST polling as baseline
    pollRest();
    restInterval = setInterval(pollRest, 20000);

    // WebSocket for instant updates
    function connect() {
      try {
        ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
        ws.onopen = () => {
          if (mounted) setWsStatus('live');
          ws.send(JSON.stringify({
            type: 'subscribe',
            product_ids: ['BTC-USD'],
            channels: ['ticker'],
          }));
        };
        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === 'ticker' && data.product_id === 'BTC-USD' && data.price) {
              const p = parseFloat(data.price);
              if (p > 0 && mounted) {
                emitPrice(p);
              }
            }
          } catch { /* malformed message */ }
        };
        ws.onerror = () => { /* silent */ };
        ws.onclose = () => {
          if (mounted) {
            setWsStatus('polling');
            reconnectTimer = setTimeout(connect, 15000);
          }
        };
      } catch {
        if (mounted) setWsStatus('polling');
      }
    }
    connect();

    return () => {
      mounted = false;
      if (ws) { try { ws.close(); } catch { /* */ } }
      clearTimeout(reconnectTimer);
      clearTimeout(emitTimer);
      clearInterval(restInterval);
    };
  }, []);

  return { price, wsStatus };
}

      style: { height: height + 'px', display: 'grid', placeItems: 'center', color: 'var(--text-faint)', fontSize: 'var(--text-xs)' },
    }, 'Chart data loading...');
  }

  const width = 640;
  const svgHeight = 220;
  const pad = 22;
  const allValues = datasets.flatMap(getNumericDatasetValues);
  let min = Math.min(...allValues);
  let max = Math.max(...allValues);
  if (min === max) {
    min -= 1;
    max += 1;
  }
  const yFor = value => pad + (1 - ((Number(value) - min) / (max - min))) * (svgHeight - pad * 2);
  const xFor = (index, count) => pad + (index / Math.max(1, count - 1)) * (width - pad * 2);

  const chartBody = type === 'bar'
    ? (() => {
        const values = datasets[0].data.map(Number).filter(Number.isFinite);
        const barWidth = Math.max(3, (width - pad * 2) / Math.max(1, values.length) * 0.72);
        return values.map((value, index) => {
          const x = xFor(index, values.length) - barWidth / 2;
          const y = Math.min(yFor(value), yFor(0));
          const barHeight = Math.max(1, Math.abs(yFor(value) - yFor(0)));
          return h('rect', {
            key: index,
            x,
            y,
            width: barWidth,
            height: barHeight,
            rx: 3,
            fill: datasets[0].backgroundColor?.[index] || datasets[0].borderColor || chartColors.orange,
            opacity: 0.82,
          });
        });
      })()
    : datasets.slice(0, 6).map((dataset, datasetIndex) => {
        const values = dataset.data.map(Number);
        const points = values
          .map((value, index) => Number.isFinite(value) ? [xFor(index, values.length), yFor(value)] : null)
          .filter(Boolean);
        if (points.length < 2) return null;
        const path = points.map((point, index) => (index ? 'L' : 'M') + point[0].toFixed(1) + ' ' + point[1].toFixed(1)).join(' ');
        return h('path', {
          key: datasetIndex,
          d: path,
          fill: 'none',
          stroke: dataset.borderColor || chartColors.orange,
          strokeWidth: dataset.borderWidth || 2,
          strokeDasharray: Array.isArray(dataset.borderDash) ? dataset.borderDash.join(' ') : undefined,
          opacity: datasetIndex === 0 ? 1 : 0.72,
          strokeLinecap: 'round',
          strokeLinejoin: 'round',
        });
      });

  return h('div', { className: 'chart-container', style: { height: height + 'px' } },
    h('svg', {
      viewBox: '0 0 ' + width + ' ' + svgHeight,
      width: '100%',
      height: '100%',
      preserveAspectRatio: 'none',
      role: 'img',
      'aria-label': 'Live chart fallback',
    },
      h('defs', null,
        h('linearGradient', { id: 'fallbackGrid', x1: '0', y1: '0', x2: '0', y2: '1' },
          h('stop', { offset: '0%', stopColor: 'rgba(247,147,26,0.08)' }),
          h('stop', { offset: '100%', stopColor: 'rgba(139,92,246,0.05)' })
        )
      ),
      h('rect', { x: 0, y: 0, width, height: svgHeight, rx: 16, fill: 'url(#fallbackGrid)' }),
      [0.25, 0.5, 0.75].map(line => h('line', {
        key: line,
        x1: pad,
        x2: width - pad,
        y1: pad + line * (svgHeight - pad * 2),
        y2: pad + line * (svgHeight - pad * 2),
        stroke: 'rgba(247,147,26,0.10)',
        strokeWidth: 1,
      })),
      chartBody,
      labels.length > 1 && h('text', { x: pad, y: svgHeight - 6, fill: 'var(--text-faint)', fontSize: 10 }, labels[0]),
      labels.length > 1 && h('text', { x: width - pad, y: svgHeight - 6, fill: 'var(--text-faint)', fontSize: 10, textAnchor: 'end' }, labels[labels.length - 1])
    )
  );
}

/* ------------------------------------------
   Base Chart.js Wrapper
   ------------------------------------------ */
globalThis.ChartComponent = function ChartComponent({ type, data, options, height = 300 }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [chartReady, setChartReady] = useState(() => !!window.Chart);

  useEffect(() => {
    if (window.Chart) {
      setChartReady(true);
      return undefined;
    }

    let attempts = 0;
    const timer = setInterval(() => {
      attempts += 1;
      if (window.Chart || attempts > 80) {
        clearInterval(timer);
        setChartReady(!!window.Chart);
      }
    }, 250);

    return () => clearInterval(timer);
  }, []);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart || !chartReady) return;
    const ctx = canvasRef.current.getContext('2d');
    const mergedOptions = mergeOptions(chartDefaults, {
      animation: false,
      resizeDelay: 120,
      transitions: {
        active: { animation: { duration: 0 } },
        resize: { animation: { duration: 0 } },
        show: { animations: {} },
        hide: { animations: {} },
      },
      ...(options || {}),
    });

    chartRef.current = new window.Chart(ctx, {
      type: type,
      data: data || { labels: [], datasets: [] },
      options: mergedOptions,
    });

    return () => {
      if (chartRef.current) {
        chartRef.current.destroy();
        chartRef.current = null;
      }
    };
  }, [type, chartReady]);

  useEffect(() => {
    const chart = chartRef.current;
    if (!chart) return;

    chart.data.labels = (data && data.labels) || [];
    chart.data.datasets = (data && data.datasets) || [];
    chart.options = mergeOptions(chartDefaults, {
      animation: false,
      resizeDelay: 120,
      transitions: {
        active: { animation: { duration: 0 } },
        resize: { animation: { duration: 0 } },
        show: { animations: {} },
        hide: { animations: {} },
      },
      ...(options || {}),
    });
    chart.update('none');
  }, [data, options]);

  if (!chartReady || !window.Chart) {
    return h(FallbackChart, { type, data, height });
  }

  return h('div', { className: 'chart-container', style: { height: height + 'px' } },
    h('canvas', { ref: canvasRef })
  );
}

globalThis.MiniSparkline = function MiniSparkline({ data, color = 'var(--btc-orange)', width = 100, height = 28 }) {
  if (!data || data.length < 2) return null;

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const padding = 2;

  const points = data.map((val, i) => {
    const x = padding + (i / (data.length - 1)) * (width - padding * 2);
    const y = padding + (1 - (val - min) / range) * (height - padding * 2);

  const areaPoints = points + ' ' + (width - padding) + ',' + height + ' ' + padding + ',' + height;

/* ------------------------------------------
   Animated Counter
   ------------------------------------------ */
globalThis.AnimatedCounter = function AnimatedCounter({ target, duration = 2000, prefix = '', suffix = '', decimals = 0, className = '' }) {
  const [current, setCurrent] = useState(0);
  const ref = useRef(null);
  const startTime = useRef(null);

  useEffect(() => {
    const animate = (timestamp) => {
      if (!startTime.current) startTime.current = timestamp;
      const progress = Math.min((timestamp - startTime.current) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
      setCurrent(target * eased);
      if (progress < 1) {
        ref.current = requestAnimationFrame(animate);
      }
    };
    ref.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(ref.current);
  }, [target, duration]);

  return h('span', { className: 'tabular-nums ' + className },
    prefix,
    decimals > 0 ? current.toFixed(decimals) : Math.floor(current).toLocaleString('en-US'),
    suffix
  );
}

globalThis.CountdownTimer = function CountdownTimer({ targetDate, label }) {
  const [countdown, setCountdown] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

  useEffect(() => {
    const update = () => {
      const target = new Date(targetDate);
      const now = new Date();
      let diff = target - now;
      if (diff < 0) diff = 0;
      setCountdown({
        days: Math.floor(diff / 86400000),
        hours: Math.floor((diff % 86400000) / 3600000),
        minutes: Math.floor((diff % 3600000) / 60000),
        seconds: Math.floor((diff % 60000) / 1000),
      });
    };
    update();
    const interval = setInterval(update, 1000);
    return () => clearInterval(interval);
  }, [targetDate]);

  const units = [
    { label: 'Days', value: countdown.days },
    { label: 'Hours', value: countdown.hours },
    { label: 'Min', value: countdown.minutes },
    { label: 'Sec', value: countdown.seconds },
  ];

  return h('div', null,
    label && h('div', { style: { fontSize: 'var(--text-sm)', color: 'var(--text-muted)', marginBottom: '12px', textAlign: 'center' } }, label),
