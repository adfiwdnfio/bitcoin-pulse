<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BTC Analytics | Bitcoin Dashboard</title>
<meta name="generator" content="Perplexity Computer">
<meta name="description" content="Comprehensive Bitcoin analytics dashboard with real-time Bitcoin data.">
<style>
:root { color-scheme: dark; background: #0a0a0f; }
html, body { margin: 0; min-height: 100%; background: #0a0a0f; color: #fff; font-family: Inter, system-ui, sans-serif; }
.boot { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
.boot-card { width: min(420px, 100%); padding: 28px; border: 1px solid rgba(247,147,26,.25); border-radius: 24px; background: linear-gradient(145deg, rgba(247,147,26,.14), rgba(18,18,26,.94)); box-shadow: 0 24px 80px rgba(0,0,0,.45); }
.coin { width: 54px; height: 54px; border-radius: 18px; margin: 0 auto 16px; display: grid; place-items: center; background: #f7931a; color: #0a0a0f; font-size: 32px; font-weight: 900; }
.pulse { width: 10px; height: 10px; margin: 18px auto 0; border-radius: 999px; background: #00d4aa; box-shadow: 0 0 0 0 rgba(0,212,170,.6); animation: pulse 1.2s infinite; }
@keyframes pulse { to { box-shadow: 0 0 0 16px rgba(0,212,170,0); } }
</style>
</head>
<body>
<div class="boot"><div class="boot-card"><div class="coin">₿</div><h1>Bitcoin Analytics</h1><p>Loading live dashboard...</p><div class="pulse"></div></div></div>
<script>
function bytesFromBase64(value) {
  const binary = atob(value.replace(/\s+/g, ''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
async function inflateWithNative(bytes) {
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  return await new Response(stream).text();
}
async function inflateWithPako(bytes) {
  await new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js';
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
  return window.pako.ungzip(bytes, { to: 'string' });
}
async function loadDashboard() {
  const manifest = await fetch('dashboard-data/manifest.json', { cache: 'no-store' }).then((res) => res.json());
  const chunks = await Promise.all(manifest.parts.map((path) => fetch(path, { cache: 'no-store' }).then((res) => res.text())));
  const bytes = bytesFromBase64(chunks.join(''));
  const html = 'DecompressionStream' in window
    ? await inflateWithNative(bytes).catch(() => inflateWithPako(bytes))
    : await inflateWithPako(bytes);
  document.open();
  document.write(html);
  document.close();
}
loadDashboard().catch((error) => {
  document.body.innerHTML = '<div class="boot"><div class="boot-card"><div class="coin">₿</div><h1>Dashboard failed to load</h1><p>Please refresh the page.</p></div></div>';
  console.error(error);
});
</script>
</body>
</html>
